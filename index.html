<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrossFit Hilversum — Mijn Inschrijvingen</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="CrossFit" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --accent: #e8ff3c;
      --accent2: #ff4c2b;
      --text: #f0f0f0;
      --muted: #666;
      --border: #2a2a2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.4rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 0.8rem;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 300;
    }

    /* Config bar */
    .config {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .config-row {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .config input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .config input::placeholder { color: var(--muted); }
    .config input:focus { border-color: var(--accent); }

    .config button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .config button:hover { opacity: 0.85; }
    .config button:active { transform: scale(0.97); }

    /* Workout log form */
    .log-section {
      margin-top: 0.85rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--border);
    }

    .log-section-title {
      font-size: 0.67rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.6rem;
    }

    .log-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.7rem;
    }

    .log-checkbox {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }

    .log-checkbox:hover { border-color: #3a3a3a; }
    .log-checkbox.checked { border-color: var(--accent); color: var(--accent); }

    .log-checkbox input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
    }

    .log-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      outline: none;
      resize: vertical;
      min-height: 56px;
      transition: border-color 0.2s;
      margin-bottom: 0.6rem;
    }

    .log-textarea:focus { border-color: var(--accent); }
    .log-textarea::placeholder { color: var(--muted); }

    .log-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.8rem;
    }

    .log-save-btn {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .log-save-btn:hover { background: #1a2200; }

    .log-status {
      font-size: 0.78rem;
      color: var(--muted);
      transition: color 0.2s;
    }

    .log-status.ok  { color: #80c040; }
    .log-status.err { color: var(--accent2); }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }

    .stat-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      line-height: 1;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.3rem;
    }

    /* Sections */
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.4s ease both;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: #3a3a3a; }

    .card.cancelled {
      opacity: 0.5;
      border-color: var(--border);
    }

    .card-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .dot-cancelled { background: var(--accent2); }

    .card-info { flex: 1; }

    .card-title {
      font-weight: 500;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }

    .card-meta {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      gap: 1rem;
    }

    .card-date {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-align: right;
      flex-shrink: 0;
    }

    .card-date.cancelled-date { color: var(--accent2); }

    /* Empty / loading states */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
      animation: fadeUp 0.4s ease both;
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 0.8rem;
      display: block;
    }

    .loader {
      display: flex;
      justify-content: center;
      padding: 3rem;
      animation: fadeUp 0.4s ease both;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .error-msg {
      background: #2a1010;
      border: 1px solid #5a2020;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      color: #ff8a7a;
      font-size: 0.85rem;
      animation: fadeUp 0.4s ease both;
    }

    /* Card with inline WOD */
    .card.has-wod {
      align-items: flex-start;
      cursor: pointer;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }

    .card-header-left { flex: 1; }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.25rem;
      flex-shrink: 0;
    }

    .wod-chevron {
      font-size: 0.8rem;
      color: var(--accent);
      opacity: 0.45;
      transition: transform 0.2s, opacity 0.2s;
      line-height: 1;
    }

    .card.has-wod:hover .wod-chevron { opacity: 0.9; }
    .card.has-wod.open .wod-chevron  { transform: rotate(180deg); opacity: 1; }

    .card-wod {
      display: none;
      margin-top: 0.85rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--border);
    }

    .wod-section + .wod-section { margin-top: 0.9rem; }

    .wod-section-title {
      font-size: 0.67rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.35rem;
    }

    .wod-section-body {
      font-size: 0.82rem;
      color: #c8d8a0;
      white-space: pre-wrap;
      line-height: 1.65;
    }

    /* Strava activiteit blok */
    .strava-block {
      margin-top: 0.85rem;
      padding: 0.65rem 0.9rem;
      background: #0d1520;
      border: 1px solid #1e2f45;
      border-radius: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.2rem;
      align-items: baseline;
    }

    .strava-block-label {
      font-size: 0.67rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #fc4c02;
      font-weight: 600;
      width: 100%;
      margin-bottom: 0.1rem;
    }

    .strava-stat {
      font-size: 0.8rem;
      color: #a8c0d8;
    }

    .strava-stat strong {
      color: #d0e8f8;
      font-weight: 600;
    }

    /* AI coaching plan */
    .coach-plan {
      margin-top: 0.85rem;
      padding: 0.8rem 1rem;
      background: #0f1a00;
      border: 1px solid #2a3a00;
      border-radius: 8px;
    }

    .coach-plan-label {
      font-size: 0.67rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .coach-plan-body {
      font-size: 0.82rem;
      color: #c8d8a0;
      line-height: 1.65;
    }

    .coach-plan-body h1,
    .coach-plan-body h2,
    .coach-plan-body h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0.7rem 0 0.3rem;
    }

    .coach-plan-body h1:first-child,
    .coach-plan-body h2:first-child,
    .coach-plan-body h3:first-child { margin-top: 0; }

    .coach-plan-body p { margin: 0.3rem 0; }

    .coach-plan-body ul,
    .coach-plan-body ol {
      padding-left: 1.2rem;
      margin: 0.3rem 0;
    }

    .coach-plan-body li { margin: 0.15rem 0; }

    .coach-plan-body strong { color: #e8f5b0; font-weight: 600; }

    .coach-plan-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
      margin: 0.5rem 0;
    }

    .coach-plan-body th {
      text-align: left;
      color: var(--accent);
      border-bottom: 1px solid #2a3a00;
      padding: 0.2rem 0.5rem 0.2rem 0;
      font-weight: 600;
    }

    .coach-plan-body td {
      padding: 0.2rem 0.5rem 0.2rem 0;
      border-bottom: 1px solid #1a2a00;
      vertical-align: top;
    }

    /* Personal Records section */
    .pr-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 2rem;
    }

    .pr-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      animation: fadeUp 0.4s ease both;
    }

    .pr-workout {
      font-weight: 500;
      font-size: 0.88rem;
      flex: 1;
    }

    .pr-notes {
      font-size: 0.78rem;
      color: #a0b880;
      flex: 2;
    }

    .pr-date {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      flex-shrink: 0;
      text-align: right;
    }

    /* Benchmark Workouts section */
    .benchmark-tabs {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.8rem;
    }

    .benchmark-tab {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .benchmark-tab:hover { border-color: #3a3a3a; color: var(--text); }
    .benchmark-tab.active { background: var(--accent); border-color: var(--accent); color: #000; }

    .benchmark-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      margin-bottom: 2rem;
    }

    .benchmark-table th {
      text-align: left;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      padding: 0.4rem 0.6rem 0.4rem 0;
    }

    .benchmark-table td {
      padding: 0.55rem 0.6rem 0.55rem 0;
      border-bottom: 1px solid #1a1a1a;
      vertical-align: middle;
    }

    .benchmark-table tr:last-child td { border-bottom: none; }

    .bm-name { font-weight: 500; color: var(--text); }
    .bm-result { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; color: var(--accent); letter-spacing: 0.04em; }
    .bm-scaling { font-size: 0.75rem; color: var(--muted); }
    .bm-date { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

    /* Daily recovery advice block */
    .recovery-block {
      background: #0a0f1a;
      border: 1px solid #1a2a4a;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    .recovery-block-label {
      font-size: 0.67rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6ab0ff;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .recovery-block-body {
      font-size: 0.83rem;
      color: #b0ccf0;
      line-height: 1.7;
    }

    .recovery-block-body h1,
    .recovery-block-body h2,
    .recovery-block-body h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #6ab0ff;
      margin: 0.6rem 0 0.25rem;
    }

    .recovery-block-body h1:first-child,
    .recovery-block-body h2:first-child,
    .recovery-block-body h3:first-child { margin-top: 0; }

    .recovery-block-body p { margin: 0.25rem 0; }

    .recovery-block-body ul,
    .recovery-block-body ol {
      padding-left: 1.2rem;
      margin: 0.25rem 0;
    }

    .recovery-block-body li { margin: 0.1rem 0; }

    .recovery-block-body strong { color: #cce0ff; font-weight: 600; }

    /* Health input block */
    .health-input-block {
      background: #0f0a1a;
      border: 1px solid #2a1a4a;
      border-radius: 12px;
      padding: 0.8rem 1.2rem;
      margin-bottom: 1rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .health-input-label {
      font-size: 0.67rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9a70ff;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .health-sliders {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .health-slider-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .health-slider-name {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      width: 72px;
      flex-shrink: 0;
    }

    .health-slider-row input[type=range] {
      flex: 1;
      accent-color: #9a70ff;
      height: 4px;
      cursor: pointer;
    }

    .health-slider-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      width: 22px;
      text-align: right;
      color: #cce0ff;
    }

    .health-save-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.7rem;
    }

    .health-save-btn {
      background: #2a1a4a;
      border: 1px solid #9a70ff;
      color: #cce0ff;
      border-radius: 8px;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }

    .health-save-btn:hover { background: #3a2a5a; }

    .health-save-status {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .health-save-status.ok { color: #4caf50; }
    .health-save-status.err { color: var(--accent2); }

    .chip-green  { color: #4caf50; }
    .chip-lime   { color: #a5d648; }
    .chip-orange { color: #ff9800; }
    .chip-red    { color: var(--accent2); }
    .chip-blue   { color: #6ab0ff; }
    .chip-purple { color: #b070ff; }
    .chip-muted  { color: #888; }

    /* Footer */
    footer {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      animation: fadeUp 0.6s 0.4s ease both;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .sync-btn {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .sync-btn:hover { background: var(--border); }
    .sync-btn:disabled { opacity: 0.5; cursor: default; }

    .sync-status {
      margin-top: 4px;
      min-height: 1em;
      font-size: 0.72rem;
    }

    .barbell-status {
      margin-top: 4px;
      font-size: 0.72rem;
    }

    .barbell-status.ok { color: #4caf50; }
    .barbell-status.fallback { color: #ff9800; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="label">CrossFit Hilversum</div>
      <h1>Mijn<br/><span>Lessen</span></h1>
      <p class="subtitle">Automatisch bijgehouden via CrossFit Hilversum</p>
    </header>

    <div id="stats" class="stats" style="display:none">
      <div class="stat">
        <div class="stat-number" id="statUpcoming">—</div>
        <div class="stat-label">Aankomend</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="statTotal">—</div>
        <div class="stat-label">Totaal</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="statCancelled">—</div>
        <div class="stat-label">Geannuleerd</div>
      </div>
    </div>

    <div id="content"></div>

    <div class="config">
      <div class="config-row">
        <input type="text" id="gistId" placeholder="Jouw Gist ID" />
        <button onclick="loadData()">Laden</button>
      </div>
      <div class="config-row">
        <input type="password" id="githubToken" placeholder="GitHub Token (voor workout loggen)" />
      </div>
    </div>

    <footer>
      <div class="footer-row">
        <span>Bijgewerkt · <span id="lastUpdated">—</span></span>
        <button id="syncBtn" class="sync-btn" onclick="triggerSync()">↻ Sync</button>
      </div>
      <div id="syncStatus" class="sync-status"></div>
      <div id="barbellStatus" class="barbell-status"></div>
    </footer>
  </div>

  <script>
    const DAY_NL = ['Zo', 'Ma', 'Di', 'Wo', 'Do', 'Vr', 'Za'];
    const MONTH_NL = ['jan', 'feb', 'mrt', 'apr', 'mei', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];

    // Load saved Gist ID
    const savedGistId = localStorage.getItem('sportbit_gist_id');
    if (savedGistId) {
      document.getElementById('gistId').value = savedGistId;
      loadData();
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${DAY_NL[d.getDay()]} ${d.getDate()} ${MONTH_NL[d.getMonth()]}`;
    }

    function isUpcoming(dateStr) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return new Date(dateStr + 'T00:00:00') >= today;
    }

    function renderCard(item, type, delay, wods) {
      const cancelled = type === 'cancelled';
      const metaHtml = `<div class="card-meta">
        <span>${item.time}</span>
        ${cancelled ? `<span>Uitgeschreven op ${item.cancelled_at?.slice(0, 10) ?? '—'}</span>` : ''}
        ${!cancelled && item.signed_up_at ? `<span>Ingeschreven op ${item.signed_up_at.slice(0, 10)}</span>` : ''}
      </div>`;

      if (wods && wods.length > 0) {
        const sections = renderWodSections(wods, item.date);
        return `
          <div class="card has-wod" style="animation-delay:${delay}s" onclick="toggleWod(this)">
            <div class="card-dot dot-active"></div>
            <div class="card-info">
              <div class="card-header">
                <div class="card-header-left">
                  <div class="card-title">${item.title}</div>
                  ${metaHtml}
                </div>
                <div class="card-right">
                  <div class="card-date">${formatDate(item.date)}</div>
                  <div class="wod-chevron">▾</div>
                </div>
              </div>
              <div class="card-wod">${sections}</div>
            </div>
          </div>`;
      }

      return `
        <div class="card ${cancelled ? 'cancelled' : ''}" style="animation-delay:${delay}s">
          <div class="card-dot ${cancelled ? 'dot-cancelled' : 'dot-active'}"></div>
          <div class="card-info">
            <div class="card-title">${item.title}</div>
            ${metaHtml}
          </div>
          <div class="card-date ${cancelled ? 'cancelled-date' : ''}">${formatDate(item.date)}</div>
        </div>`;
    }

    // Registreer service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }

    // ── SugarWOD ──────────────────────────────────────────────

    let wodByDate = {};
    let workoutPlans = {};
    let barbellLifts = {};
    let recoveryAdvice = null;
    let personalRecords = [];
    let benchmarkWorkouts = [];
    let workoutLog = {};   // {date: entry} from workout_log.json
    let stravaData = null; // Strava activiteiten data
    let healthInput = {}; // Subjectieve hersteldata {slaap, energie, spierpijn}
    let currentGistId = '';

    const MAIN_KEYWORDS = ['metcon', 'weightlifting', 'team metcon', 'strength', 'conditioning'];

    // Load saved token
    const savedToken = localStorage.getItem('sportbit_github_token');
    if (savedToken) document.getElementById('githubToken').value = savedToken;

    document.getElementById('githubToken').addEventListener('change', () => {
      const t = document.getElementById('githubToken').value.trim();
      if (t) localStorage.setItem('sportbit_github_token', t);
    });

    function stripHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      return div.textContent || div.innerText || '';
    }

    async function loadWod(gistId) {
      currentGistId = gistId;
      const el = document.getElementById('wod-status');
      try {
        const resp = await fetch(`https://api.github.com/gists/${gistId}`);
        if (!resp.ok) { if (el) el.textContent = `WOD: API fout ${resp.status}`; return; }
        const gist = await resp.json();

        // Load workout log
        const logFile = gist.files['workout_log.json'];
        if (logFile) {
          try {
            const logData = JSON.parse(logFile.content);
            workoutLog = {};
            for (const entry of (logData.entries || [])) {
              workoutLog[entry.date] = entry;
            }
          } catch (e) { /* ignore parse errors */ }
        }

        const file = gist.files['sugarwod_wod.json'];
        if (!file) { if (el) el.textContent = 'WOD: sugarwod_wod.json niet gevonden in Gist'; return; }
        const data = JSON.parse(file.content);
        wodByDate = data.by_date || {};
        workoutPlans = data.workout_plans || {};
        barbellLifts = data.barbell_lifts || {};
        recoveryAdvice = data.recovery_advice || null;
        personalRecords = data.personal_records || [];
        benchmarkWorkouts = data.benchmark_workouts || [];
        stravaData = data.strava_data || null;

        // Laad health_input.json (subjectieve hersteldata)
        const healthFile = gist.files['health_input.json'];
        if (healthFile) {
          try { healthInput = JSON.parse(healthFile.content) || {}; } catch(e) {}
        }
        const n = Object.keys(wodByDate).length;
        if (el) el.textContent = n > 0 ? `WOD geladen voor ${n} dag(en)` : 'WOD: geen workouts in by_date (fetch mislukt?)';

        // Barbell source indicator
        const bsEl = document.getElementById('barbellStatus');
        if (bsEl) {
          const source = data.barbell_source;
          const liftCount = Object.keys(barbellLifts).length;
          if (source === 'scraper') {
            bsEl.textContent = `Barbell maxima: ${liftCount} lifts live opgehaald via SugarWOD`;
            bsEl.className = 'barbell-status ok';
          } else if (source === 'fallback') {
            bsEl.textContent = `Barbell maxima: fallback gebruikt (${liftCount} lifts) — scraper kon niet inloggen`;
            bsEl.className = 'barbell-status fallback';
          } else {
            bsEl.textContent = `Barbell maxima: ${liftCount} lifts`;
            bsEl.className = 'barbell-status';
          }
        }
      } catch (e) { if (el) el.textContent = `WOD fout: ${e.message}`; }
    }

    function getMainWods(date) {
      return (wodByDate[date] || []).filter(w =>
        w.description || MAIN_KEYWORDS.some(k => (w.title || '').toLowerCase().includes(k))
      );
    }

    function renderLogSection(date) {
      const entry = workoutLog[date];
      const mainWods = wodByDate[date] || [];
      const checkedTitles = entry ? (entry.workouts_done || []) : [];
      const existingNotes = entry ? (entry.notes || '') : '';

      const checkboxes = mainWods.map(w => {
        const isChecked = checkedTitles.includes(w.title);
        return `<label class="log-checkbox${isChecked ? ' checked' : ''}">
          <input type="checkbox" data-date="${date}" value="${escapeHtml(w.title)}"${isChecked ? ' checked' : ''}
            onchange="this.closest('.log-checkbox').classList.toggle('checked', this.checked)">
          ${escapeHtml(w.title)}
        </label>`;
      }).join('');

      const savedLabel = entry ? `<span class="log-status ok" id="log-status-${date}">✓ Opgeslagen</span>` :
                                  `<span class="log-status" id="log-status-${date}"></span>`;

      return `<div class="log-section">
        <div class="log-section-title">Wat heb je gedaan?</div>
        ${mainWods.length > 0
          ? `<div class="log-checkboxes" id="log-checks-${date}">${checkboxes}</div>`
          : `<div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.6rem">Geen workouts bekend voor deze dag</div>`}
        <textarea class="log-textarea" id="log-notes-${date}" placeholder="Gewichten & notities (bijv. Deadlift 60kg, Box Jump step-down…)">${escapeHtml(existingNotes)}</textarea>
        <div class="log-actions">
          ${savedLabel}
          <button class="log-save-btn" onclick="saveWorkoutLog('${date}')">Opslaan</button>
        </div>
      </div>`;
    }

    async function saveWorkoutLog(date) {
      const token = document.getElementById('githubToken').value.trim();
      const statusEl = document.getElementById(`log-status-${date}`);

      if (!token) {
        if (statusEl) { statusEl.textContent = '⚠ Voer eerst een GitHub Token in'; statusEl.className = 'log-status err'; }
        return;
      }

      // Collect checked workouts
      const checks = document.querySelectorAll(`#log-checks-${date} input[type="checkbox"]:checked`);
      const workoutsDone = Array.from(checks).map(cb => cb.value);

      const notes = (document.getElementById(`log-notes-${date}`) || {}).value || '';

      const newEntry = {
        date,
        workouts_done: workoutsDone,
        notes,
        logged_at: new Date().toISOString(),
      };

      if (statusEl) { statusEl.textContent = 'Opslaan…'; statusEl.className = 'log-status'; }

      try {
        // Fetch current log
        const resp = await fetch(`https://api.github.com/gists/${currentGistId}`, {
          headers: { Authorization: `token ${token}` },
        });
        if (!resp.ok) throw new Error(`GitHub API ${resp.status}`);
        const gist = await resp.json();

        let entries = [];
        const existing = gist.files['workout_log.json'];
        if (existing) {
          try { entries = JSON.parse(existing.content).entries || []; } catch(e) {}
        }

        // Replace entry for this date
        entries = entries.filter(e => e.date !== date);
        entries.push(newEntry);
        entries.sort((a, b) => b.date.localeCompare(a.date));

        const patch = await fetch(`https://api.github.com/gists/${currentGistId}`, {
          method: 'PATCH',
          headers: {
            Authorization: `token ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            files: { 'workout_log.json': { content: JSON.stringify({ entries }, null, 2) } }
          }),
        });

        if (!patch.ok) throw new Error(`Opslaan mislukt: ${patch.status}`);

        workoutLog[date] = newEntry;
        if (statusEl) { statusEl.textContent = '✓ Opgeslagen'; statusEl.className = 'log-status ok'; }
      } catch(e) {
        if (statusEl) { statusEl.textContent = `❌ ${e.message}`; statusEl.className = 'log-status err'; }
      }
    }

    function renderPastCard(item, delay) {
      const wods = wodByDate[item.date] || [];
      const hasWod = wods.length > 0;
      const metaHtml = `<div class="card-meta">
        <span>${item.time}</span>
        ${item.signed_up_at ? `<span>Ingeschreven op ${item.signed_up_at.slice(0, 10)}</span>` : ''}
      </div>`;

      const wodSections = hasWod ? wods.map(w => {
        const desc = stripHtml(w.description || '').trim();
        return `<div class="wod-section">
          <div class="wod-section-title">${w.title}</div>
          ${desc ? `<div class="wod-section-body">${desc}</div>` : ''}
        </div>`;
      }).join('') : '';

      const logHtml = renderLogSection(item.date);
      const stravaHtml = renderStravaBlock(item.date);

      return `
        <div class="card has-wod" style="animation-delay:${delay}s">
          <div class="card-dot dot-active" style="opacity:0.4"></div>
          <div class="card-info">
            <div class="card-header" onclick="toggleWod(this.closest('.card'))" style="cursor:pointer">
              <div class="card-header-left">
                <div class="card-title">${item.title}</div>
                ${metaHtml}
              </div>
              <div class="card-right">
                <div class="card-date">${formatDate(item.date)}</div>
                <div class="wod-chevron">▾</div>
              </div>
            </div>
            <div class="card-wod">${wodSections}${stravaHtml}${logHtml}</div>
          </div>
        </div>`;
    }

    function renderWodSections(wods, date) {
      const sections = wods.map(w => {
        const desc = stripHtml(w.description || '').trim();
        return `<div class="wod-section">
          <div class="wod-section-title">${w.title}</div>
          ${desc ? `<div class="wod-section-body">${desc}</div>` : ''}
        </div>`;
      }).join('');

      const plan = date && workoutPlans[date];
      const planHtml = plan ? `
        <div class="coach-plan">
          <div class="coach-plan-label">AI Coach Plan</div>
          <div class="coach-plan-body">${marked.parse(plan)}</div>
        </div>` : '';

      return sections + planHtml;
    }

    function renderStravaBlock(date) {
      if (!stravaData) return '';
      const acts = (stravaData.activities_by_date || {})[date];
      if (!acts || acts.length === 0) return '';
      return acts.map(act => {
        const dur   = act.duration_min ? `<span class="strava-stat"><strong>${act.duration_min}</strong> min</span>` : '';
        const hr    = act.avg_hr   ? `<span class="strava-stat">gem.HR <strong>${Math.round(act.avg_hr)}</strong> bpm</span>` : '';
        const hrMax = act.max_hr   ? `<span class="strava-stat">max.HR <strong>${Math.round(act.max_hr)}</strong> bpm</span>` : '';
        const cal   = act.calories ? `<span class="strava-stat"><strong>${Math.round(act.calories)}</strong> kcal</span>` : '';
        const name  = act.name     ? ` — ${act.name}` : '';
        return `<div class="strava-block">
          <div class="strava-block-label">Strava${name}</div>
          ${dur}${hr}${hrMax}${cal}
        </div>`;
      }).join('');
    }

    function toggleWod(card) {
      const wod = card.querySelector('.card-wod');
      wod.style.display = wod.style.display === 'block' ? 'none' : 'block';
      card.classList.toggle('open');
    }


    // ── Sign-up data ──────────────────────────────────────────

    async function loadData() {
      const gistId = document.getElementById('gistId').value.trim();
      if (!gistId) return;

      localStorage.setItem('sportbit_gist_id', gistId);

      const content = document.getElementById('content');
      content.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
      document.getElementById('stats').style.display = 'none';

      try {
        const resp = await fetch(`https://api.github.com/gists/${gistId}`);
        if (!resp.ok) throw new Error(`GitHub API fout: ${resp.status}`);
        const gist = await resp.json();

        const file = gist.files['sportbit_state.json'];
        if (!file) throw new Error('sportbit_state.json niet gevonden in Gist');

        const state = JSON.parse(file.content);
        const signedUp = Object.values(state.signed_up || {});
        const cancelled = Object.values(state.cancelled || {});

        // Sort by date
        signedUp.sort((a, b) => a.date.localeCompare(b.date));
        cancelled.sort((a, b) => b.date.localeCompare(a.date));

        const upcoming = signedUp.filter(e => isUpcoming(e.date));
        const past = signedUp.filter(e => !isUpcoming(e.date));

        // Stats
        document.getElementById('statUpcoming').textContent = upcoming.length;
        document.getElementById('statTotal').textContent = signedUp.length;
        document.getElementById('statCancelled').textContent = cancelled.length;
        document.getElementById('stats').style.display = 'grid';

        // Last updated
        document.getElementById('lastUpdated').textContent =
          new Date(gist.updated_at).toLocaleString('nl-NL');

        // Load WOD from the same Gist
        await loadWod(gistId);

        let html = '';

        // Subjectieve hersteldata invoer
        html += renderHealthInputBlock();

        // Recovery advice
        if (recoveryAdvice) {
          html += `<div class="recovery-block">
            <div class="recovery-block-label">Coach Advies Vandaag</div>
            <div class="recovery-block-body">${marked.parse(recoveryAdvice)}</div>
          </div>`;
        }

        // Upcoming
        html += `<div class="section-title">Aankomend</div><div class="cards">`;
        if (upcoming.length === 0) {
          html += `<div class="empty"><span class="empty-icon">🏋️</span>Geen aankomende inschrijvingen</div>`;
        } else {
          upcoming.forEach((e, i) => html += renderCard(e, 'active', i * 0.05, wodByDate[e.date]));
        }
        html += `</div>`;

        // Cancelled
        if (cancelled.length > 0) {
          html += `<div class="section-title">Uitgeschreven</div><div class="cards">`;
          cancelled.forEach((e, i) => html += renderCard(e, 'cancelled', i * 0.05));
          html += `</div>`;
        }

        // Past
        if (past.length > 0) {
          html += `<div class="section-title">Eerder</div><div class="cards">`;
          past.slice(-5).reverse().forEach((e, i) => html += renderPastCard(e, i * 0.05));
          html += `</div>`;
        }

        // Personal Records
        if (personalRecords.length > 0) {
          const sorted = [...personalRecords].sort((a, b) => {
            const da = a.date || '';
            const db = b.date || '';
            return db.localeCompare(da);
          });
          html += `<div class="section-title">Persoonlijke Records</div><div class="pr-list">`;
          sorted.forEach((pr, i) => {
            const dateLabel = pr.date ? formatPrDate(pr.date) : '—';
            html += `<div class="pr-item" style="animation-delay:${i * 0.03}s">
              <div class="pr-workout">${escapeHtml(pr.workout)}</div>
              <div class="pr-notes">${escapeHtml(pr.notes || '')}</div>
              <div class="pr-date">${dateLabel}</div>
            </div>`;
          });
          html += `</div>`;
        }

        // Benchmark Workouts
        if (benchmarkWorkouts.length > 0) {
          html += `<div class="section-title">Benchmark Workouts</div>` + renderBenchmarks(benchmarkWorkouts);
        }

        content.innerHTML = html;

      } catch (e) {
        content.innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
      }
    }

    async function triggerSync() {
      const token = document.getElementById('githubToken').value.trim();
      const statusEl = document.getElementById('syncStatus');
      const btn = document.getElementById('syncBtn');

      if (!token) {
        statusEl.textContent = 'Vul eerst je GitHub Token in (nodig om workflow te starten)';
        statusEl.style.color = 'var(--accent2)';
        return;
      }

      btn.disabled = true;
      btn.textContent = '↻ Bezig…';
      statusEl.textContent = 'Workflow starten…';
      statusEl.style.color = 'var(--muted)';

      try {
        const resp = await fetch(
          'https://api.github.com/repos/ralphdeleeuw/sportbit/actions/workflows/fetch_sugarwod.yml/dispatches',
          {
            method: 'POST',
            headers: {
              Authorization: `token ${token}`,
              Accept: 'application/vnd.github+json',
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ ref: 'main' }),
          }
        );
        if (resp.status === 204) {
          statusEl.textContent = 'Workflow gestart! Duurt ~3 min. Daarna opnieuw laden.';
          statusEl.style.color = '#4caf50';
        } else {
          const body = await resp.json().catch(() => ({}));
          statusEl.textContent = `Fout ${resp.status}: ${body.message || 'onbekend'}`;
          statusEl.style.color = 'var(--accent2)';
        }
      } catch (e) {
        statusEl.textContent = `Netwerkfout: ${e.message}`;
        statusEl.style.color = 'var(--accent2)';
      } finally {
        btn.disabled = false;
        btn.textContent = '↻ Sync';
      }
    }

    function renderBenchmarks(benchmarks) {
      // Group by category
      const categories = {};
      for (const b of benchmarks) {
        const cat = b.category || 'Overig';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(b);
      }
      const cats = Object.keys(categories).sort();
      const firstCat = cats[0];
      const tabsId = 'bm-tabs';
      const tableId = 'bm-table';

      let tabsHtml = cats.map(cat =>
        `<button class="benchmark-tab${cat === firstCat ? ' active' : ''}" onclick="switchBenchmarkTab('${escapeHtml(cat)}')">${escapeHtml(cat)}</button>`
      ).join('');

      // Encode all categories as JSON in a hidden script
      const encoded = JSON.stringify(categories);

      return `
        <div id="${tabsId}" class="benchmark-tabs">${tabsHtml}</div>
        <script id="bm-data" type="application/json">${encoded}<\/script>
        <div id="${tableId}">${buildBenchmarkTable(categories[firstCat])}</div>`;
    }

    function buildBenchmarkTable(rows) {
      const sorted = [...rows].sort((a, b) => (a.name || '').localeCompare(b.name || '', 'nl'));
      return `<table class="benchmark-table">
        <thead><tr>
          <th>Benchmark</th>
          <th>Resultaat</th>
          <th>Scaling</th>
          <th>Datum</th>
        </tr></thead>
        <tbody>${sorted.map(r => `<tr>
          <td class="bm-name">${escapeHtml(r.name)}</td>
          <td class="bm-result">${escapeHtml(r.result)}</td>
          <td class="bm-scaling">${escapeHtml(r.scaling)}</td>
          <td class="bm-date">${escapeHtml(r.date)}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    }

    function switchBenchmarkTab(cat) {
      // Update active tab
      document.querySelectorAll('.benchmark-tab').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === cat);
      });
      // Load data and re-render table
      const raw = document.getElementById('bm-data');
      if (!raw) return;
      const categories = JSON.parse(raw.textContent);
      const table = document.getElementById('bm-table');
      if (table && categories[cat]) {
        table.innerHTML = buildBenchmarkTable(categories[cat]);
      }
    }

    function formatPrDate(raw) {
      // Accepts YYYY-MM-DD, YYYYMMDD, or human-readable strings
      const clean = raw.replace(/\//g, '-').trim();
      const m = clean.match(/^(\d{4})-?(\d{2})-?(\d{2})/);
      if (m) {
        const d = new Date(`${m[1]}-${m[2]}-${m[3]}T00:00:00`);
        return `${d.getDate()} ${MONTH_NL[d.getMonth()]} ${d.getFullYear()}`;
      }
      return raw;
    }

    // ── Health input helpers ──────────────────────────────────────────────

    function renderHealthInputBlock() {
      const slaap   = healthInput.slaap    != null ? healthInput.slaap    : 3;
      const energie = healthInput.energie  != null ? healthInput.energie  : 3;
      const pijn    = healthInput.spierpijn != null ? healthInput.spierpijn : 3;
      const gistId  = currentGistId;
      const token   = document.getElementById('githubToken')?.value?.trim();

      return `<div class="health-input-block">
        <div class="health-input-label">Herstel vandaag</div>
        <div class="health-sliders">
          <div class="health-slider-row">
            <span class="health-slider-name">Slaap</span>
            <input type="range" id="sliderSlaap" min="1" max="5" step="1" value="${slaap}"
              oninput="document.getElementById('valSlaap').textContent=this.value">
            <span class="health-slider-val" id="valSlaap">${slaap}</span>
          </div>
          <div class="health-slider-row">
            <span class="health-slider-name">Energie</span>
            <input type="range" id="sliderEnergie" min="1" max="5" step="1" value="${energie}"
              oninput="document.getElementById('valEnergie').textContent=this.value">
            <span class="health-slider-val" id="valEnergie">${energie}</span>
          </div>
          <div class="health-slider-row">
            <span class="health-slider-name">Spierpijn</span>
            <input type="range" id="sliderSpierpijn" min="1" max="5" step="1" value="${pijn}"
              oninput="document.getElementById('valSpierpijn').textContent=this.value">
            <span class="health-slider-val" id="valSpierpijn">${pijn}</span>
          </div>
        </div>
        <div class="health-save-row">
          <button class="health-save-btn" onclick="saveHealthInput()">Opslaan</button>
          <span class="health-save-status" id="healthSaveStatus"></span>
        </div>
      </div>`;
    }

    async function saveHealthInput() {
      const gistId = currentGistId;
      const token  = document.getElementById('githubToken')?.value?.trim();
      const statusEl = document.getElementById('healthSaveStatus');

      if (!gistId || !token) {
        if (statusEl) { statusEl.textContent = 'Stel eerst Gist ID en token in'; statusEl.className = 'health-save-status err'; }
        return;
      }

      const today = new Date().toISOString().slice(0, 10);
      const data = {
        date:      today,
        slaap:     parseInt(document.getElementById('sliderSlaap').value),
        energie:   parseInt(document.getElementById('sliderEnergie').value),
        spierpijn: parseInt(document.getElementById('sliderSpierpijn').value),
        updated_at: new Date().toISOString(),
      };

      try {
        if (statusEl) { statusEl.textContent = 'Opslaan…'; statusEl.className = 'health-save-status'; }
        const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
          method: 'PATCH',
          headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ files: { 'health_input.json': { content: JSON.stringify(data, null, 2) } } }),
        });
        if (!resp.ok) throw new Error(`${resp.status}`);
        healthInput = data;
        if (statusEl) { statusEl.textContent = '✓ Opgeslagen'; statusEl.className = 'health-save-status ok'; }
      } catch(e) {
        if (statusEl) { statusEl.textContent = `Fout: ${e.message}`; statusEl.className = 'health-save-status err'; }
      }
    }

    // ── end health input helpers ──────────────────────────────────────────

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>

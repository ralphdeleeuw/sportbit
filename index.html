<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrossFit Hilversum — Mijn Inschrijvingen</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="CrossFit" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --accent: #e8ff3c;
      --accent2: #ff4c2b;
      --text: #f0f0f0;
      --muted: #666;
      --border: #2a2a2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.4rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 0.8rem;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 300;
    }

    /* Config bar */
    .config {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .config-row {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .config input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .config input::placeholder { color: var(--muted); }
    .config input:focus { border-color: var(--accent); }

    .config button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .config button:hover { opacity: 0.85; }
    .config button:active { transform: scale(0.97); }

    /* Workout log form */
    .log-section {
      margin-top: 0.85rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--border);
    }

    .log-section-title {
      font-size: 0.67rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.6rem;
    }

    .log-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.7rem;
    }

    .log-checkbox {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }

    .log-checkbox:hover { border-color: #3a3a3a; }
    .log-checkbox.checked { border-color: var(--accent); color: var(--accent); }

    .log-checkbox input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
    }

    .log-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      outline: none;
      resize: vertical;
      min-height: 56px;
      transition: border-color 0.2s;
      margin-bottom: 0.6rem;
    }

    .log-textarea:focus { border-color: var(--accent); }
    .log-textarea::placeholder { color: var(--muted); }

    .log-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.8rem;
    }

    .log-save-btn {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .log-save-btn:hover { background: #1a2200; }

    .niet-gedaan-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.3rem 0.85rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .niet-gedaan-btn:hover { color: var(--accent2); border-color: var(--accent2); }
    .niet-gedaan-btn:disabled { opacity: 0.5; cursor: default; }

    .log-status {
      font-size: 0.78rem;
      color: var(--muted);
      transition: color 0.2s;
    }

    .log-status.ok  { color: #80c040; }
    .log-status.err { color: var(--accent2); }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }

    .stat-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      line-height: 1;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.3rem;
    }

    /* Sections */
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-title.collapsible {
      cursor: pointer;
      user-select: none;
    }
    .section-title.collapsible::before {
      content: '▸';
      font-size: 0.8rem;
      color: var(--muted);
      transition: transform 0.2s;
      display: inline-block;
      width: 1em;
      flex-shrink: 0;
    }
    .section-title.collapsible.open::before {
      transform: rotate(90deg);
    }
    .collapsible-body { display: none; }
    .collapsible-body.open { display: block; }

    /* Cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.4s ease both;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: #3a3a3a; }

    .card.cancelled {
      opacity: 0.5;
      border-color: var(--border);
    }

    .card-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .dot-cancelled { background: var(--accent2); }

    .card-info { flex: 1; }

    .card-title {
      font-weight: 500;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }

    .card-meta {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      gap: 1rem;
    }

    .card-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .card-date {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-align: right;
      flex-shrink: 0;
    }

    .card-date.cancelled-date { color: var(--accent2); }

    .card-relative-day {
      font-size: 0.65rem;
      color: var(--muted);
      text-align: right;
      letter-spacing: 0.03em;
      margin-top: 2px;
    }

    /* Empty / loading states */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
      animation: fadeUp 0.4s ease both;
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 0.8rem;
      display: block;
    }

    .loader {
      display: flex;
      justify-content: center;
      padding: 3rem;
      animation: fadeUp 0.4s ease both;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .error-msg {
      background: #2a1010;
      border: 1px solid #5a2020;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      color: #ff8a7a;
      font-size: 0.85rem;
      animation: fadeUp 0.4s ease both;
    }

    /* Card with inline WOD */
    .card.has-wod {
      align-items: flex-start;
      cursor: pointer;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }

    .card-header-left { flex: 1; }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.25rem;
      flex-shrink: 0;
    }

    .wod-chevron {
      font-size: 0.8rem;
      color: var(--accent);
      opacity: 0.45;
      transition: transform 0.2s, opacity 0.2s;
      line-height: 1;
    }

    .card.has-wod:hover .wod-chevron { opacity: 0.9; }
    .card.has-wod.open .wod-chevron  { transform: rotate(180deg); opacity: 1; }

    .card-wod {
      display: none;
      margin-top: 0.85rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--border);
    }

    .env-badge {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.7rem;
    }

    .wod-section + .wod-section { margin-top: 0.9rem; }

    .wod-section-title {
      font-size: 0.67rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.35rem;
    }

    .wod-section-body {
      font-size: 0.82rem;
      color: #c8d8a0;
      white-space: pre-wrap;
      line-height: 1.65;
    }

    /* Strava activiteit blok */
    .strava-block {
      margin-top: 0.85rem;
      padding: 0.65rem 0.9rem;
      background: #0d1520;
      border: 1px solid #1e2f45;
      border-radius: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.2rem;
      align-items: baseline;
    }

    .strava-block-label {
      font-size: 0.67rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #fc4c02;
      font-weight: 600;
      width: 100%;
      margin-bottom: 0.1rem;
    }

    .strava-stat {
      font-size: 0.8rem;
      color: #a8c0d8;
    }

    .strava-stat strong {
      color: #d0e8f8;
      font-weight: 600;
    }

    /* AI coaching plan */
    .coach-plan {
      margin-top: 0.85rem;
      padding: 0.8rem 1rem;
      background: #0f1a00;
      border: 1px solid #2a3a00;
      border-radius: 8px;
    }

    .coach-plan-label {
      font-size: 0.67rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .coach-plan-body {
      font-size: 0.82rem;
      color: #c8d8a0;
      line-height: 1.65;
    }

    .coach-plan-body h1,
    .coach-plan-body h2,
    .coach-plan-body h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0.7rem 0 0.3rem;
    }

    .coach-plan-body h1:first-child,
    .coach-plan-body h2:first-child,
    .coach-plan-body h3:first-child { margin-top: 0; }

    .coach-plan-body p { margin: 0.3rem 0; }

    .coach-plan-body ul,
    .coach-plan-body ol {
      padding-left: 1.2rem;
      margin: 0.3rem 0;
    }

    .coach-plan-body li { margin: 0.15rem 0; }

    .coach-plan-body strong { color: #e8f5b0; font-weight: 600; }

    .coach-plan-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
      margin: 0.5rem 0;
    }

    .coach-plan-body th {
      text-align: left;
      color: var(--accent);
      border-bottom: 1px solid #2a3a00;
      padding: 0.2rem 0.5rem 0.2rem 0;
      font-weight: 600;
    }

    .coach-plan-body td {
      padding: 0.2rem 0.5rem 0.2rem 0;
      border-bottom: 1px solid #1a2a00;
      vertical-align: top;
    }

    /* Personal Records section */
    .pr-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 2rem;
    }

    .pr-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      animation: fadeUp 0.4s ease both;
    }

    .pr-workout {
      font-weight: 500;
      font-size: 0.88rem;
      flex: 1;
    }

    .pr-result {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .pr-notes {
      font-size: 0.75rem;
      color: var(--muted);
      flex: 2;
    }

    .pr-date {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      flex-shrink: 0;
      text-align: right;
    }

    /* Benchmark Workouts section */
    .benchmark-tabs {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.8rem;
    }

    .benchmark-tab {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .benchmark-tab:hover { border-color: #3a3a3a; color: var(--text); }
    .benchmark-tab.active { background: var(--accent); border-color: var(--accent); color: #000; }

    .benchmark-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      margin-bottom: 2rem;
    }

    .benchmark-table th {
      text-align: left;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      padding: 0.4rem 0.6rem 0.4rem 0;
    }

    .benchmark-table td {
      padding: 0.55rem 0.6rem 0.55rem 0;
      border-bottom: 1px solid #1a1a1a;
      vertical-align: middle;
    }

    .benchmark-table tr:last-child td { border-bottom: none; }

    .bm-name { font-weight: 500; color: var(--text); }
    .bm-result { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; color: var(--accent); letter-spacing: 0.04em; }
    .bm-scaling { font-size: 0.75rem; color: var(--muted); }
    .bm-date { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

    /* Daily recovery advice block */
    .garmin-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      margin-bottom: 1rem;
    }

    .garmin-block-label {
      font-size: 0.67rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .garmin-tsb-badge {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      color: #000;
    }

    .garmin-block-details {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .withings-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      margin-bottom: 1rem;
    }

    .withings-block-label {
      font-size: 0.67rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .withings-date {
      font-weight: 400;
      opacity: 0.7;
      text-transform: none;
      letter-spacing: 0;
    }

    .withings-block-details {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .recovery-block {
      background: #0a0f1a;
      border: 1px solid #1a2a4a;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    .recovery-block-label {
      font-size: 0.67rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6ab0ff;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .recovery-block-body {
      font-size: 0.83rem;
      color: #b0ccf0;
      line-height: 1.7;
    }

    .recovery-block-body h1,
    .recovery-block-body h2,
    .recovery-block-body h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #6ab0ff;
      margin: 0.6rem 0 0.25rem;
    }

    .recovery-block-body h1:first-child,
    .recovery-block-body h2:first-child,
    .recovery-block-body h3:first-child { margin-top: 0; }

    .recovery-block-body p { margin: 0.25rem 0; }

    .recovery-block-body ul,
    .recovery-block-body ol {
      padding-left: 1.2rem;
      margin: 0.25rem 0;
    }

    .recovery-block-body li { margin: 0.1rem 0; }

    .recovery-block-body strong { color: #cce0ff; font-weight: 600; }

    /* Health input block */
    .health-input-block {
      background: #0f0a1a;
      border: 1px solid #2a1a4a;
      border-radius: 12px;
      padding: 0.8rem 1.2rem;
      margin-bottom: 1rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .health-input-label {
      font-size: 0.67rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9a70ff;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .health-sliders {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .health-slider-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .health-slider-name {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      width: 72px;
      flex-shrink: 0;
    }

    .health-slider-row input[type=range] {
      flex: 1;
      accent-color: #9a70ff;
      height: 4px;
      cursor: pointer;
    }

    .health-slider-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      width: 22px;
      text-align: right;
      color: #cce0ff;
    }

    .health-save-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.7rem;
    }

    .health-save-btn {
      background: #2a1a4a;
      border: 1px solid #9a70ff;
      color: #cce0ff;
      border-radius: 8px;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }

    .health-save-btn:hover { background: #3a2a5a; }

    .health-save-status {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .health-save-status.ok { color: #4caf50; }
    .health-save-status.err { color: var(--accent2); }

    .health-input-compact { padding: 0.5rem 1rem; }
    .health-compact-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .health-compact-row .health-input-label { margin-bottom: 0; flex-shrink: 0; }
    .health-compact-values {
      display: flex;
      gap: 0.6rem;
      font-size: 0.78rem;
      color: #cce0ff;
      flex: 1;
    }
    .health-compact-values span { opacity: 0.85; }
    .health-edit-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }
    .health-edit-btn:hover { color: #cce0ff; }

    .chip-green  { color: #4caf50; }
    .chip-lime   { color: #a5d648; }
    .chip-orange { color: #ff9800; }
    .chip-red    { color: var(--accent2); }
    .chip-blue   { color: #6ab0ff; }
    .chip-purple { color: #b070ff; }
    .chip-muted  { color: #888; }

    /* Footer */
    footer {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      animation: fadeUp 0.6s 0.4s ease both;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .sync-btn {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .sync-btn:hover { background: var(--border); }
    .sync-btn:disabled { opacity: 0.5; cursor: default; }

    .sync-options {
      display: flex;
      gap: 1rem;
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .sync-options label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .sync-status {
      margin-top: 4px;
      min-height: 1em;
      font-size: 0.72rem;
    }

    .barbell-status {
      margin-top: 4px;
      font-size: 0.72rem;
    }

    .barbell-status.ok { color: #4caf50; }
    .barbell-status.fallback { color: #ff9800; }

    /* ── Skeleton loading ────────────────────────────────────── */
    @keyframes skeleton-pulse {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: skeleton-pulse 1.4s ease infinite;
      border-radius: 8px;
    }
    .skeleton-card {
      height: 72px;
      margin-bottom: 0.6rem;
      border-radius: 12px;
    }
    .skeleton-section-title {
      height: 22px;
      width: 140px;
      margin-bottom: 0.8rem;
    }
    .skeleton-stat {
      border-radius: 12px;
    }

    /* ── Capacity badge ──────────────────────────────────────── */
    .capacity-badge {
      font-size: 0.68rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.15rem 0.55rem;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }
    .capacity-badge.near-full { color: #ff9800; border-color: #3a2800; }
    .capacity-badge.full      { color: var(--accent2); border-color: #5a2020; }
    .capacity-badge.open      { color: #4caf50; border-color: #1a3a1a; }

    /* ── Barbell lift table ──────────────────────────────────── */
    .barbell-lift-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .barbell-lift-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      animation: fadeUp 0.4s ease both;
    }
    .barbell-lift-name {
      font-weight: 500;
      font-size: 0.88rem;
      flex: 1;
      padding-top: 0.1rem;
    }
    .barbell-rm-list {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      flex-shrink: 0;
      min-width: 100px;
    }
    .barbell-rm-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.6rem;
    }
    .barbell-rm-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      width: 30px;
      flex-shrink: 0;
    }
    .barbell-rm-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      text-align: right;
    }

    /* ── Barbell chart section ───────────────────────────────── */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.4s ease both;
    }
    .chart-controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.8rem;
      align-items: center;
    }
    .chart-lift-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
      font-size: 0.72rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .chart-lift-btn:hover { border-color: #3a3a3a; color: var(--text); }
    .chart-lift-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
    .chart-container { position: relative; height: 180px; }
    .chart-empty { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.82rem; }

    /* ── Meals section ───────────────────────────────────────── */
    .meals-block {
      background: #0a1508;
      border: 1px solid #1a3a10;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.15s ease both;
    }
    .meals-block-label {
      font-size: 0.67rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6bd46b;
      font-weight: 600;
      margin-bottom: 0.6rem;
    }
    .meal-row {
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid #1a3010;
    }
    .meal-row:last-child { border-bottom: none; }
    .meal-date {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem;
      color: #6bd46b;
      letter-spacing: 0.04em;
      flex-shrink: 0;
      width: 56px;
    }
    .meal-name {
      font-size: 0.83rem;
      color: #c8e8b8;
      flex: 1;
    }
    .meal-kcal {
      font-size: 0.72rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ── Health trend ────────────────────────────────────────── */
    .health-trend {
      margin-top: 0.6rem;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .health-trend-row {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.4rem;
      flex-wrap: wrap;
    }
    .health-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="label">CrossFit Hilversum</div>
      <h1>Mijn<br/><span>Lessen</span></h1>
      <p class="subtitle">Automatisch bijgehouden via CrossFit Hilversum</p>
    </header>


    <div id="content"></div>

    <div class="config">
      <div class="config-row">
        <input type="text" id="gistId" placeholder="Jouw Gist ID" />
        <button onclick="loadData()">Laden</button>
      </div>
      <div class="config-row">
        <input type="password" id="githubToken" placeholder="GitHub Token (voor workout loggen)" />
      </div>
    </div>

    <footer>
      <div class="footer-row">
        <span>Bijgewerkt · <span id="lastUpdated">—</span></span>
        <button id="signupBtn" class="sync-btn" onclick="triggerSignup()">⚡ Inschrijven</button>
        <button id="syncBtn" class="sync-btn" onclick="triggerSync()">↻ Sync</button>
      </div>
      <div class="sync-options">
        <label><input type="checkbox" id="skipStrava"> Strava overslaan</label>
        <label><input type="checkbox" id="skipAI"> AI coaching overslaan</label>
      </div>
      <div id="signupStatus" class="sync-status"></div>
      <div id="syncStatus" class="sync-status"></div>
      <div id="barbellStatus" class="barbell-status"></div>
    </footer>
  </div>

  <script>
    const DAY_NL = ['Zo', 'Ma', 'Di', 'Wo', 'Do', 'Vr', 'Za'];
    const MONTH_NL = ['jan', 'feb', 'mrt', 'apr', 'mei', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];

    // Load saved Gist ID
    const savedGistId = localStorage.getItem('sportbit_gist_id');
    if (savedGistId) {
      document.getElementById('gistId').value = savedGistId;
      loadData();
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${DAY_NL[d.getDay()]} ${d.getDate()} ${MONTH_NL[d.getMonth()]}`;
    }

    function relativeDay(dateStr) {
      const today = new Date(); today.setHours(0,0,0,0);
      const d = new Date(dateStr + 'T00:00:00');
      const diff = Math.round((d - today) / 86400000);
      if (diff === 0) return 'vandaag';
      if (diff === 1) return 'morgen';
      if (diff === -1) return 'gisteren';
      if (diff > 1) return `over ${diff} dagen`;
      return `${Math.abs(diff)} dagen geleden`;
    }

    function isUpcoming(dateStr, timeStr) {
      const classStart = new Date(dateStr + 'T' + (timeStr || '00:00') + ':00');
      return classStart > new Date();
    }

    function renderCapacityBadge(date, time) {
      const key = `${date}_${time}`;
      const cap = classCapacity[key];
      if (!cap || !cap.max) return '';
      const pct = cap.current / cap.max;
      let cls = 'open';
      if (pct >= 1) cls = 'full';
      else if (pct >= 0.8) cls = 'near-full';
      return `<span class="capacity-badge ${cls}">${cap.current}/${cap.max}</span>`;
    }

    function renderCard(item, type, delay, wods) {
      const cancelled = type === 'cancelled';
      const metaHtml = `<div class="card-meta">
        <span class="card-time">${item.time}</span>
      </div>`;

      if (wods && wods.length > 0) {
        const sections = renderWodSections(wods, item.date);
        const envBadge = !cancelled ? renderEnvBadge(item.date) : '';
        return `
          <div class="card has-wod" style="animation-delay:${delay}s" onclick="toggleWod(this)">
            <div class="card-dot dot-active"></div>
            <div class="card-info">
              <div class="card-header">
                <div class="card-header-left">
                  <div class="card-title">${item.title}</div>
                  ${metaHtml}
                </div>
                <div class="card-right">
                  <div class="card-date">${formatDate(item.date)}</div>
                  <div class="card-relative-day">${relativeDay(item.date)}</div>
                  <div class="wod-chevron">▾</div>
                </div>
              </div>
              <div class="card-wod">${envBadge}${sections}</div>
            </div>
          </div>`;
      }

      return `
        <div class="card ${cancelled ? 'cancelled' : ''}" style="animation-delay:${delay}s">
          <div class="card-dot ${cancelled ? 'dot-cancelled' : 'dot-active'}"></div>
          <div class="card-info">
            <div class="card-title">${item.title}</div>
            ${metaHtml}
          </div>
          <div class="card-right">
            <div class="card-date ${cancelled ? 'cancelled-date' : ''}">${formatDate(item.date)}</div>
            <div class="card-relative-day">${relativeDay(item.date)}</div>
          </div>
        </div>`;
    }

    // Registreer service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }

    // ── SugarWOD ──────────────────────────────────────────────

    let wodByDate = {};
    let workoutPlans = {};
    let barbellLifts = {};
    let barbellLiftsHistory = []; // [{date, lifts: {...}}]
    let recoveryAdvice = null;
    let recoveryAdviceHistory = []; // [{date, advice}] laatste 3 dagen
    let recoveryAdviceFromHistory = false; // true als advies uit history komt i.p.v. vandaag
    let healthInputExpanded = false; // true als compact-weergave handmatig uitgevouwen is
    let personalRecords = [];
    let benchmarkWorkouts = [];
    let workoutLog = {};   // {date: entry} from workout_log.json
    let stravaData = null; // Strava activiteiten data
    let healthInput = {}; // Subjectieve hersteldata {slaap, energie, spierpijn, stress}
    let healthHistory = []; // [{date, slaap, energie, spierpijn, stress}]
    let classCapacity = {}; // {"YYYY-MM-DD_HH:MM": {current, max, checked_at}}
    let keukenbaasData = null; // {meals: [...], fetched_at}
    let intervalsData = null;   // {wellness: {by_date: {...}}, activities: {by_date: {...}}, fetched_at}
    let withingsData = null;    // {measurements: [...], fetched_at}
    let environmentalData = null; // {training_conditions: {...}, aqi: {...}, fetched_at}
    let activeChartLift = null;
    let liftChart = null;
    let currentGistId = '';

    const MAIN_KEYWORDS = ['metcon', 'weightlifting', 'team metcon', 'strength', 'conditioning'];

    // Load saved token
    const savedToken = localStorage.getItem('sportbit_github_token');
    if (savedToken) document.getElementById('githubToken').value = savedToken;

    document.getElementById('githubToken').addEventListener('change', () => {
      const t = document.getElementById('githubToken').value.trim();
      if (t) localStorage.setItem('sportbit_github_token', t);
    });

    function stripHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      return div.textContent || div.innerText || '';
    }

    function parseGistFiles(gist) {
      // Parse all relevant files from a gist response (single network call)
      const files = gist.files || {};

      // workout_log.json
      const logFile = files['workout_log.json'];
      if (logFile) {
        try {
          const logData = JSON.parse(logFile.content);
          workoutLog = {};
          for (const entry of (logData.entries || [])) workoutLog[entry.date] = entry;
        } catch (e) { /* ignore */ }
      }

      // sugarwod_wod.json
      const wodFile = files['sugarwod_wod.json'];
      if (wodFile) {
        try {
          const data = JSON.parse(wodFile.content);
          wodByDate = data.by_date || {};
          workoutPlans = data.workout_plans || {};
          barbellLifts = data.barbell_lifts || {};
          barbellLiftsHistory = data.barbell_lifts_history || [];
          recoveryAdviceHistory = data.recovery_advice_history || [];
          recoveryAdvice = data.recovery_advice || null;
          // Val terug op meest recente history-entry als vandaag geen advies beschikbaar is
          if (!recoveryAdvice && recoveryAdviceHistory.length > 0) {
            const latest = recoveryAdviceHistory[recoveryAdviceHistory.length - 1];
            recoveryAdvice = latest.advice || null;
            recoveryAdviceFromHistory = !!recoveryAdvice;
          }
          personalRecords = data.personal_records || [];
          benchmarkWorkouts = data.benchmark_workouts || [];
          stravaData = data.strava_data || null;
          intervalsData = data.intervals_data || null;
          withingsData = data.withings_data || null;
          environmentalData = data.environmental_data || null;

          const bsEl = document.getElementById('barbellStatus');
          if (bsEl) {
            const source = data.barbell_source;
            const liftCount = Object.keys(barbellLifts).length;
            if (source === 'scraper') {
              bsEl.textContent = `Barbell maxima: ${liftCount} lifts live opgehaald via SugarWOD`;
              bsEl.className = 'barbell-status ok';
            } else if (source === 'fallback') {
              bsEl.textContent = `Barbell maxima: fallback gebruikt (${liftCount} lifts) — scraper kon niet inloggen`;
              bsEl.className = 'barbell-status fallback';
            } else {
              bsEl.textContent = `Barbell maxima: ${liftCount} lifts`;
              bsEl.className = 'barbell-status';
            }
          }
        } catch (e) { /* ignore */ }
      }

      // health_input.json
      const healthFile = files['health_input.json'];
      if (healthFile) {
        try {
          const h = JSON.parse(healthFile.content) || {};
          healthInput = h;
          healthHistory = h.history || [];
        } catch(e) {}
      }

      // sportbit_state.json — class_capacity
      const stateFile = files['sportbit_state.json'];
      if (stateFile) {
        try {
          const st = JSON.parse(stateFile.content);
          classCapacity = st.class_capacity || {};
        } catch(e) {}
      }

      // keukenbaas_meals.json
      const mealsFile = files['keukenbaas_meals.json'];
      if (mealsFile) {
        try { keukenbaasData = JSON.parse(mealsFile.content); } catch(e) {}
      }
    }

    async function loadWod(gistId) {
      // Legacy: kept for compatibility but now just re-fetches and calls parseGistFiles
      currentGistId = gistId;
      const el = document.getElementById('wod-status');
      const token = document.getElementById('githubToken').value.trim();
      const authHeaders = token ? { Authorization: `token ${token}` } : {};
      try {
        const resp = await fetch(`https://api.github.com/gists/${gistId}`, { headers: authHeaders });
        if (!resp.ok) { if (el) el.textContent = `WOD: API fout ${resp.status}`; return; }
        const gist = await resp.json();
        parseGistFiles(gist);
        const n = Object.keys(wodByDate).length;
        if (el) el.textContent = n > 0 ? `WOD geladen voor ${n} dag(en)` : 'WOD: geen workouts in by_date (fetch mislukt?)';
      } catch (e) { if (el) el.textContent = `WOD fout: ${e.message}`; }
    }

    function getMainWods(date) {
      return (wodByDate[date] || []).filter(w =>
        w.description || MAIN_KEYWORDS.some(k => (w.title || '').toLowerCase().includes(k))
      );
    }

    function renderLogSection(date) {
      const entry = workoutLog[date];
      const mainWods = wodByDate[date] || [];
      const checkedTitles = entry ? (entry.workouts_done || []) : [];
      const existingNotes = entry ? (entry.notes || '') : '';

      const checkboxes = mainWods.map(w => {
        const isChecked = checkedTitles.includes(w.title);
        return `<label class="log-checkbox${isChecked ? ' checked' : ''}">
          <input type="checkbox" data-date="${date}" value="${escapeHtml(w.title)}"${isChecked ? ' checked' : ''}
            onchange="this.closest('.log-checkbox').classList.toggle('checked', this.checked)">
          ${escapeHtml(w.title)}
        </label>`;
      }).join('');

      const savedLabel = entry ? `<span class="log-status ok" id="log-status-${date}">✓ Opgeslagen</span>` :
                                  `<span class="log-status" id="log-status-${date}"></span>`;

      return `<div class="log-section">
        <div class="log-section-title">Wat heb je gedaan?</div>
        ${mainWods.length > 0
          ? `<div class="log-checkboxes" id="log-checks-${date}">${checkboxes}</div>`
          : `<div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.6rem">Geen workouts bekend voor deze dag</div>`}
        <textarea class="log-textarea" id="log-notes-${date}" placeholder="Gewichten & notities (bijv. Deadlift 60kg, Box Jump step-down…)">${escapeHtml(existingNotes)}</textarea>
        <div class="log-actions">
          ${savedLabel}
          <button class="log-save-btn" onclick="saveWorkoutLog('${date}')">Opslaan</button>
        </div>
      </div>`;
    }

    async function saveWorkoutLog(date) {
      const token = document.getElementById('githubToken').value.trim();
      const statusEl = document.getElementById(`log-status-${date}`);

      if (!token) {
        if (statusEl) { statusEl.textContent = '⚠ Voer eerst een GitHub Token in'; statusEl.className = 'log-status err'; }
        return;
      }

      // Collect checked workouts
      const checks = document.querySelectorAll(`#log-checks-${date} input[type="checkbox"]:checked`);
      const workoutsDone = Array.from(checks).map(cb => cb.value);

      const notes = (document.getElementById(`log-notes-${date}`) || {}).value || '';

      const newEntry = {
        date,
        workouts_done: workoutsDone,
        notes,
        logged_at: new Date().toISOString(),
      };

      if (statusEl) { statusEl.textContent = 'Opslaan…'; statusEl.className = 'log-status'; }

      try {
        // Fetch current log
        const resp = await fetch(`https://api.github.com/gists/${currentGistId}`, {
          headers: { Authorization: `token ${token}` },
        });
        if (!resp.ok) throw new Error(`GitHub API ${resp.status}`);
        const gist = await resp.json();

        let entries = [];
        const existing = gist.files['workout_log.json'];
        if (existing) {
          try { entries = JSON.parse(existing.content).entries || []; } catch(e) {}
        }

        // Replace entry for this date
        entries = entries.filter(e => e.date !== date);
        entries.push(newEntry);
        entries.sort((a, b) => b.date.localeCompare(a.date));

        const patch = await fetch(`https://api.github.com/gists/${currentGistId}`, {
          method: 'PATCH',
          headers: {
            Authorization: `token ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            files: { 'workout_log.json': { content: JSON.stringify({ entries }, null, 2) } }
          }),
        });

        if (!patch.ok) throw new Error(`Opslaan mislukt: ${patch.status}`);

        workoutLog[date] = newEntry;
        if (statusEl) { statusEl.textContent = '✓ Opgeslagen'; statusEl.className = 'log-status ok'; }
      } catch(e) {
        if (statusEl) { statusEl.textContent = `❌ ${e.message}`; statusEl.className = 'log-status err'; }
      }
    }

    async function markNietGedaan(eventId, date, time, title, btn) {
      const token = document.getElementById('githubToken').value.trim();
      if (!token) {
        btn.textContent = '⚠ Token nodig';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Opslaan…';
      try {
        // Fetch current state
        const resp = await fetch(`https://api.github.com/gists/${currentGistId}`, {
          headers: { Authorization: `token ${token}` },
        });
        if (!resp.ok) throw new Error(`GitHub API ${resp.status}`);
        const gist = await resp.json();
        const stateRaw = gist.files['sportbit_state.json']?.content;
        if (!stateRaw) throw new Error('sportbit_state.json niet gevonden');
        const state = JSON.parse(stateRaw);

        // Move event from signed_up to cancelled
        delete state.signed_up[eventId];
        state.cancelled = state.cancelled || {};
        state.cancelled[eventId] = {
          date, time, title,
          cancelled_at: new Date().toISOString(),
        };

        const patch = await fetch(`https://api.github.com/gists/${currentGistId}`, {
          method: 'PATCH',
          headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            files: { 'sportbit_state.json': { content: JSON.stringify(state, null, 2) } }
          }),
        });
        if (!patch.ok) throw new Error(`Opslaan mislukt ${patch.status}`);

        // Hide the card visually
        btn.closest('.card').style.opacity = '0.4';
        btn.textContent = '✓ Verwijderd uit coach context';
      } catch(e) {
        btn.disabled = false;
        btn.textContent = `❌ ${e.message}`;
      }
    }

    function renderStravaBlock(date) {
      if (!stravaData) return '';

      if (!acts || acts.length === 0) return '';
      return acts.map(act => {
        const dur     = act.duration_min ? `<span class="strava-stat"><strong>${act.duration_min}</strong> min</span>` : '';
        const elapsed = act.elapsed_min  ? `<span class="strava-stat">totaal <strong>${act.elapsed_min}</strong> min</span>` : '';
        const hr      = act.avg_hr   ? `<span class="strava-stat">gem.HR <strong>${Math.round(act.avg_hr)}</strong> bpm</span>` : '';
        const hrMax   = act.max_hr   ? `<span class="strava-stat">max.HR <strong>${Math.round(act.max_hr)}</strong> bpm</span>` : '';
        const cal     = act.calories ? `<span class="strava-stat"><strong>${Math.round(act.calories)}</strong> kcal</span>` : '';
        const suffer  = act.suffer_score       ? `<span class="strava-stat">RE <strong>${Math.round(act.suffer_score)}</strong></span>` : '';
        const rpe     = act.perceived_exertion ? `<span class="strava-stat">RPE <strong>${act.perceived_exertion}</strong></span>` : '';

        return `<div class="strava-block">

    async function loadData() {
      const gistId = document.getElementById('gistId').value.trim();
      if (!gistId) return;

      localStorage.setItem('sportbit_gist_id', gistId);
      currentGistId = gistId;

      const content = document.getElementById('content');
      content.innerHTML = buildSkeleton();


      const token = document.getElementById('githubToken').value.trim();
      const authHeaders = token ? { Authorization: `token ${token}` } : {};

      try {
        // Single fetch — parse all files from one response
        const resp = await fetch(`https://api.github.com/gists/${gistId}`, { headers: authHeaders });
        if (!resp.ok) throw new Error(`GitHub API fout: ${resp.status}`);
        const gist = await resp.json();

        // Parse all file types from this single response
        parseGistFiles(gist);

        const stateFile = gist.files['sportbit_state.json'];
        if (!stateFile) throw new Error('sportbit_state.json niet gevonden in Gist');

        const state = JSON.parse(stateFile.content);
        // Include event_id in each item so the "Niet gedaan" button can patch the state
        const signedUp = Object.entries(state.signed_up || {}).map(([id, info]) => ({...info, event_id: id}));
        const cancelled = Object.values(state.cancelled || {});

        signedUp.sort((a, b) => a.date.localeCompare(b.date));
        cancelled.sort((a, b) => b.date.localeCompare(a.date));

        const upcoming = signedUp.filter(e => isUpcoming(e.date, e.time));
        const past = signedUp.filter(e => !isUpcoming(e.date, e.time));


        document.getElementById('lastUpdated').textContent =
          new Date(gist.updated_at).toLocaleString('nl-NL');

        let html = '';

        // Health input + recovery coach
        html += `<div id="healthInputWrapper">${renderHealthInputBlock()}</div>`;
        html += renderGarminBlock();
        html += renderWithingsBlock();
        if (recoveryAdvice) {
          const adviceLabel = recoveryAdviceFromHistory
            ? `Coach Advies (${recoveryAdviceHistory[recoveryAdviceHistory.length - 1].date})`
            : 'Coach Advies Vandaag';
          html += `<div class="recovery-block">
            <div class="recovery-block-label">${adviceLabel}</div>
            <div class="recovery-block-body">${marked.parse(recoveryAdvice)}</div>
          </div>`;
        }

        // Meals block (Keukenbaas)
        const mealsHtml = renderMealsBlock();
        if (mealsHtml) html += mealsHtml;

        // Upcoming classes
        html += `<div class="section-title">Aankomend</div><div class="cards">`;
        if (upcoming.length === 0) {
          html += `<div class="empty"><span class="empty-icon">🏋️</span>Geen aankomende inschrijvingen</div>`;
        } else {
          upcoming.forEach((e, i) => html += renderCard(e, 'active', i * 0.05, wodByDate[e.date]));
        }
        html += `</div>`;

        // Cancelled — only today + next 8 days
        const todayStr = new Date().toISOString().slice(0, 10);
        const maxDateStr = (() => { const d = new Date(); d.setDate(d.getDate() + 8); return d.toISOString().slice(0, 10); })();
        const recentCancelled = cancelled.filter(e => e.date >= todayStr && e.date <= maxDateStr);
        if (recentCancelled.length > 0) {
          html += `<div class="section-title">Uitgeschreven</div><div class="cards">`;
          recentCancelled.forEach((e, i) => html += renderCard(e, 'cancelled', i * 0.05));
          html += `</div>`;
        }

        // Past
        if (past.length > 0) {
          html += `<div class="section-title">Eerder</div><div class="cards">`;
          past.slice(-5).reverse().forEach((e, i) => html += renderPastCard(e, i * 0.05));
          html += `</div>`;
        }

        // Barbell progressie (table + chart)
        if (Object.keys(barbellLifts).length > 0) {
          html += `<div class="section-title collapsible" onclick="toggleSection(this)">Kracht</div><div class="collapsible-body">${renderBarbellSection()}</div>`;
        }

        // Personal Records
        if (personalRecords.length > 0) {
          const sorted = [...personalRecords].sort((a, b) =>
            (b.date || '').localeCompare(a.date || '')
          );
          html += `<div class="section-title collapsible" onclick="toggleSection(this)">Persoonlijke Records</div><div class="collapsible-body"><div class="pr-list">`;
          sorted.forEach((pr, i) => {
            const dateLabel = pr.date ? formatPrDate(pr.date) : '—';
            html += `<div class="pr-item" style="animation-delay:${i * 0.03}s">
              <div class="pr-workout">${escapeHtml(pr.workout)}</div>
              ${pr.result ? `<div class="pr-result">${escapeHtml(pr.result)}</div>` : ''}
              ${pr.notes ? `<div class="pr-notes">${escapeHtml(pr.notes)}</div>` : ''}
              <div class="pr-date">${dateLabel}</div>
            </div>`;
          });
          html += `</div></div>`;
        }

        // Benchmark Workouts
        if (benchmarkWorkouts.length > 0) {
          html += `<div class="section-title collapsible" onclick="toggleSection(this)">Benchmark Workouts</div><div class="collapsible-body">` + renderBenchmarks(benchmarkWorkouts) + `</div>`;
        }

        content.innerHTML = html;

        // Initialize chart after DOM is ready
        if (Object.keys(barbellLifts).length > 0) {
          initBarbellChart();
        }

      } catch (e) {
        content.innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
      }
    }

        const inputs = {};

        const resp = await fetch(
          'https://api.github.com/repos/ralphdeleeuw/sportbit/actions/workflows/fetch_sugarwod.yml/dispatches',

    async function pollWorkflowRun(token, triggerTime, statusEl, btn, workflowFile = 'fetch_sugarwod.yml', btnLabel = '↻ Sync') {
      const headers = {
        Authorization: `token ${token}`,
        Accept: 'application/vnd.github+json',
      };
      const runsUrl = `https://api.github.com/repos/ralphdeleeuw/sportbit/actions/workflows/${workflowFile}/runs?event=workflow_dispatch&per_page=5`;
      const maxWaitMs = 10 * 60 * 1000; // 10 min timeout
      const pollInterval = 15000; // 15 sec
      const started = Date.now();

      // Wait a moment before first poll so GitHub registers the run
      await new Promise(r => setTimeout(r, 5000));

      while (Date.now() - started < maxWaitMs) {
        try {
          const r = await fetch(runsUrl, { headers });
          if (r.ok) {
            const data = await r.json();
            const run = (data.workflow_runs || []).find(
              wr => new Date(wr.created_at) >= triggerTime
            );
            if (run) {
              const elapsed = Math.round((Date.now() - started) / 1000);
              if (run.status === 'completed') {
                if (run.conclusion === 'success') {
                  statusEl.textContent = `✅ Klaar (${elapsed}s) — data opnieuw laden…`;
                  statusEl.style.color = '#4caf50';
                  btn.disabled = false;
                  btn.textContent = btnLabel;
                  await new Promise(r => setTimeout(r, 1500));
                  await loadData();
                  statusEl.textContent = `✅ Data bijgewerkt (${elapsed}s geleden)`;
                } else {
                  statusEl.textContent = `❌ Workflow mislukt: ${run.conclusion}`;
                  statusEl.style.color = 'var(--accent2)';
                  btn.disabled = false;
                  btn.textContent = btnLabel;
                }
                return;
              } else if (run.status === 'in_progress') {
                statusEl.textContent = `⚙️ Bezig… (${elapsed}s)`;
                statusEl.style.color = 'var(--muted)';
              } else {
                statusEl.textContent = `⏳ In wachtrij… (${elapsed}s)`;
                statusEl.style.color = 'var(--muted)';
              }
            }
          }
        } catch (_) { /* network blip, keep polling */ }

        await new Promise(r => setTimeout(r, pollInterval));
      }

      // Timeout
      statusEl.textContent = 'Timeout: workflow duurde te lang. Laad handmatig opnieuw.';
      statusEl.style.color = 'var(--accent2)';
      btn.disabled = false;
      btn.textContent = btnLabel;
    }

    function renderBenchmarks(benchmarks) {
      // Group by category
      const categories = {};
      for (const b of benchmarks) {
        const cat = b.category || 'Overig';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(b);
      }
      const cats = Object.keys(categories).sort();
      const firstCat = cats[0];
      const tabsId = 'bm-tabs';
      const tableId = 'bm-table';

      let tabsHtml = cats.map(cat =>
        `<button class="benchmark-tab${cat === firstCat ? ' active' : ''}" onclick="switchBenchmarkTab('${escapeHtml(cat)}')">${escapeHtml(cat)}</button>`
      ).join('');

      // Encode all categories as JSON in a hidden script
      const encoded = JSON.stringify(categories);

      return `
        <div id="${tabsId}" class="benchmark-tabs">${tabsHtml}</div>
        <script id="bm-data" type="application/json">${encoded}<\/script>
        <div id="${tableId}">${buildBenchmarkTable(categories[firstCat])}</div>`;
    }

    function buildBenchmarkTable(rows) {
      const sorted = [...rows].sort((a, b) => (a.name || '').localeCompare(b.name || '', 'nl'));
      return `<table class="benchmark-table">
        <thead><tr>
          <th>Benchmark</th>
          <th>Resultaat</th>
          <th>Scaling</th>
          <th>Datum</th>
        </tr></thead>
        <tbody>${sorted.map(r => `<tr>
          <td class="bm-name">${escapeHtml(r.name)}</td>
          <td class="bm-result">${escapeHtml(r.result)}</td>
          <td class="bm-scaling">${escapeHtml(r.scaling)}</td>
          <td class="bm-date">${escapeHtml(r.date)}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    }

    function switchBenchmarkTab(cat) {
      // Update active tab
      document.querySelectorAll('.benchmark-tab').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === cat);
      });
      // Load data and re-render table
      const raw = document.getElementById('bm-data');
      if (!raw) return;
      const categories = JSON.parse(raw.textContent);
      const table = document.getElementById('bm-table');
      if (table && categories[cat]) {
        table.innerHTML = buildBenchmarkTable(categories[cat]);
      }
    }

    function formatPrDate(raw) {
      // Accepts YYYY-MM-DD, YYYYMMDD, or human-readable strings
      const clean = raw.replace(/\//g, '-').trim();
      const m = clean.match(/^(\d{4})-?(\d{2})-?(\d{2})/);
      if (m) {
        const d = new Date(`${m[1]}-${m[2]}-${m[3]}T00:00:00`);
        return `${d.getDate()} ${MONTH_NL[d.getMonth()]} ${d.getFullYear()}`;
      }
      return raw;
    }

    function healthTrendPips(field, invert = false) {
      const recent = [...(healthHistory || [])]
        .sort((a, b) => a.date.localeCompare(b.date))
        .slice(-14);
      if (recent.length < 2) return '';
      const colors = ['#ff4c2b','#ff9800','#ffdc40','#a5d648','#4caf50'];
      const pips = recent.map(h => {
        const v = h[field];
        if (v == null) return '';
        const idx = invert ? 4 - Math.max(0, Math.min(4, v - 1)) : Math.max(0, Math.min(4, v - 1));
        const c = colors[idx];
        return `<span class="health-pip" style="background:${c}" title="${h.date}: ${v}/5"></span>`;
      }).join('');
      return `<div class="health-trend"><div class="health-trend-row">${pips}</div></div>`;
    }

      const slaap   = healthInput.slaap    != null ? healthInput.slaap    : 3;
      const energie = healthInput.energie  != null ? healthInput.energie  : 3;
      const pijn    = healthInput.spierpijn != null ? healthInput.spierpijn : 3;
      const stress  = healthInput.stress   != null ? healthInput.stress   : 3;

      return `<div class="health-input-block">
        <div class="health-input-label">Herstel vandaag</div>
        <div class="health-sliders">
          <div class="health-slider-row">
            <span class="health-slider-name">Slaap</span>
            <input type="range" id="sliderSlaap" min="1" max="5" step="1" value="${slaap}"
              oninput="document.getElementById('valSlaap').textContent=this.value">
            <span class="health-slider-val" id="valSlaap">${slaap}</span>
          </div>
          ${healthTrendPips('slaap')}
          <div class="health-slider-row">
            <span class="health-slider-name">Energie</span>
            <input type="range" id="sliderEnergie" min="1" max="5" step="1" value="${energie}"
              oninput="document.getElementById('valEnergie').textContent=this.value">
            <span class="health-slider-val" id="valEnergie">${energie}</span>
          </div>
          ${healthTrendPips('energie')}
          <div class="health-slider-row">
            <span class="health-slider-name">Spierpijn</span>
            <input type="range" id="sliderSpierpijn" min="1" max="5" step="1" value="${pijn}"
              oninput="document.getElementById('valSpierpijn').textContent=this.value">
            <span class="health-slider-val" id="valSpierpijn">${pijn}</span>
          </div>
          ${healthTrendPips('spierpijn', true)}
          <div class="health-slider-row">
            <span class="health-slider-name">Stress</span>
            <input type="range" id="sliderStress" min="1" max="5" step="1" value="${stress}"
              oninput="document.getElementById('valStress').textContent=this.value">
            <span class="health-slider-val" id="valStress">${stress}</span>
          </div>
          ${healthTrendPips('stress', true)}
        </div>
        <div class="health-save-row">
          <button class="health-save-btn" onclick="saveHealthInput()">Opslaan</button>
          <span class="health-save-status" id="healthSaveStatus"></span>
        </div>
      </div>`;
    }

    function expandHealthInput() {
      healthInputExpanded = true;
      const wrapper = document.getElementById('healthInputWrapper');
      if (wrapper) wrapper.innerHTML = renderHealthInputBlock();
    }

    async function saveHealthInput() {
      const gistId = currentGistId;
      const token  = document.getElementById('githubToken')?.value?.trim();
      const statusEl = document.getElementById('healthSaveStatus');

      if (!gistId || !token) {
        if (statusEl) { statusEl.textContent = 'Stel eerst Gist ID en token in'; statusEl.className = 'health-save-status err'; }
        return;
      }

      const today = new Date().toISOString().slice(0, 10);
      const slaap     = parseInt(document.getElementById('sliderSlaap').value);
      const energie   = parseInt(document.getElementById('sliderEnergie').value);
      const spierpijn = parseInt(document.getElementById('sliderSpierpijn').value);
      const stress    = parseInt(document.getElementById('sliderStress').value);

      // Build updated history: keep existing entries, replace/add today
      const todayEntry = { date: today, slaap, energie, spierpijn, stress };
      const updatedHistory = [
        ...(healthHistory || []).filter(h => h.date !== today),
        todayEntry,
      ].sort((a, b) => a.date.localeCompare(b.date)).slice(-90); // keep last 90 days

      const data = {
        date: today,
        slaap,
        energie,
        spierpijn,
        stress,
        updated_at: new Date().toISOString(),
        history: updatedHistory,
      };

      try {
        if (statusEl) { statusEl.textContent = 'Opslaan…'; statusEl.className = 'health-save-status'; }
        const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
          method: 'PATCH',
          headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ files: { 'health_input.json': { content: JSON.stringify(data, null, 2) } } }),
        });
        if (!resp.ok) throw new Error(`${resp.status}`);
        healthInput = { ...data };
        healthHistory = updatedHistory;
        healthInputExpanded = false;
        const wrapper = document.getElementById('healthInputWrapper');
        if (wrapper) wrapper.innerHTML = renderHealthInputBlock();
      } catch(e) {
        if (statusEl) { statusEl.textContent = `Fout: ${e.message}`; statusEl.className = 'health-save-status err'; }
      }
    }

    // ── end health input helpers ──────────────────────────────────────────

    // ── Garmin / intervals.icu wellness widget ───────────────────────────
    function renderGarminBlock() {
      if (!intervalsData || !intervalsData.wellness || !intervalsData.wellness.by_date) return '';
      const today = new Date().toISOString().slice(0, 10);
      const yesterday = (() => { const d = new Date(); d.setDate(d.getDate() - 1); return d.toISOString().slice(0, 10); })();
      const entry = intervalsData.wellness.by_date[today] || intervalsData.wellness.by_date[yesterday];
      if (!entry) return '';

      const rhr  = entry.resting_hr;
      const hrv  = entry.hrv;
      const tsb  = entry.tsb;
      const ctl  = entry.ctl;
      const atl  = entry.atl;
      const slp  = entry.sleep_hrs;
      const slpScore = entry.sleep_score;

      if (rhr == null && hrv == null && tsb == null) return '';

      // TSB kleur: positief = groen (fris), negatief = oranje/rood (vermoeid)
      const tsbColor = tsb == null ? '#888'
        : tsb > 5  ? '#2ecc71'
        : tsb < -10 ? '#e74c3c'
        : '#f39c12';
      const tsbLabel = tsb == null ? '' : tsb > 5 ? 'Fris' : tsb < -10 ? 'Vermoeid' : 'Neutraal';
      const tsbBadge = tsb != null
        ? `<span class="garmin-tsb-badge" style="background:${tsbColor}">${tsbLabel} ${tsb > 0 ? '+' : ''}${Math.round(tsb)}</span>`
        : '';

      const details = [];
      if (rhr != null) details.push(`rustpols ${rhr} bpm`);
      if (hrv != null) details.push(`HRV ${Math.round(hrv)} ms`);
      if (slp != null) details.push(`slaap ${slp.toFixed(1)}u`);
      if (slpScore != null) details.push(`slaapscore ${slpScore}`);
      if (ctl != null && atl != null) details.push(`fitness ${Math.round(ctl)} · vermoeidheid ${Math.round(atl)}`);

      return `<div class="garmin-block">
        <div class="garmin-block-label">Garmin ${tsbBadge}</div>
        ${details.length ? `<div class="garmin-block-details">${details.join(' · ')}</div>` : ''}
      </div>`;
    }

    // ── Withings widget ──────────────────────────────────────────────────
    function renderWithingsBlock() {
      if (!withingsData || !withingsData.measurements || withingsData.measurements.length === 0) return '';
      const latest = withingsData.measurements[0];
      const prev   = withingsData.measurements[1];

      const weight = latest.weight_kg;
      if (weight == null) return '';

      let trendHtml = '';
      if (prev && prev.weight_kg != null) {
        const delta = Math.round((weight - prev.weight_kg) * 10) / 10;
        if (delta !== 0) {
          const arrow = delta > 0 ? '↑' : '↓';
          const color = delta > 0 ? '#e74c3c' : '#2ecc71';
          trendHtml = `<span style="color:${color};margin-left:4px">${arrow} ${Math.abs(delta)}kg</span>`;
        }
      }

      const details = [];
      if (latest.fat_pct != null)      details.push(`vet ${latest.fat_pct}%`);
      if (latest.muscle_kg != null)    details.push(`spier ${latest.muscle_kg}kg`);
      if (latest.hydration_kg != null) details.push(`hydratatie ${latest.hydration_kg}kg`);
      if (latest.visceral_fat != null) details.push(`visceraal vet ${latest.visceral_fat}`);
      if (latest.nerve_health != null) details.push(`zenuw ${latest.nerve_health}/100`);
      if (latest.pwv_ms != null)       details.push(`PWV ${latest.pwv_ms}m/s`);

      return `<div class="withings-block">
        <div class="withings-block-label">Withings — ${weight}kg${trendHtml} <span class="withings-date">${latest.date}</span></div>
        ${details.length ? `<div class="withings-block-details">${details.join(' · ')}</div>` : ''}
      </div>`;
    }

    // ── Environmental widget (gebruikt in renderCard via renderEnvBadge) ─
    function renderEnvBadge(dateStr) {
      if (!environmentalData) return '';
      const cond = (environmentalData.training_conditions || {})[dateStr];
      const aqi  = environmentalData.aqi;
      if (!cond && !aqi) return '';

      const parts = [];
      if (cond) {
        parts.push(`${Math.round(cond.temp_c)}°C`);
        if (cond.feels_like_c != null && Math.abs(cond.feels_like_c - cond.temp_c) >= 2) {
          parts.push(`(voelt ${Math.round(cond.feels_like_c)}°C)`);
        }
        parts.push(cond.weather_desc);
        if (cond.humidity_pct != null) parts.push(`${cond.humidity_pct}% vochtig`);
      }
      if (aqi) {
        const aqiColor = aqi.value <= 50 ? '#2ecc71' : aqi.value <= 100 ? '#f39c12' : '#e74c3c';
        parts.push(`<span class="aqi-badge" style="background:${aqiColor}">AQI ${aqi.value}</span>`);
      }
      return parts.length ? `<div class="env-badge">${parts.join(' · ')}</div>` : '';
    }

    // ── end Oura/Withings/Environmental helpers ──────────────────────────

    // ── Keukenbaas meals ─────────────────────────────────────────────────

    function renderMealsBlock() {
      if (!keukenbaasData || !keukenbaasData.meals || keukenbaasData.meals.length === 0) return '';
      const today = new Date().toISOString().slice(0, 10);
      // Show meals for the next 7 days starting today
      const meals = keukenbaasData.meals
        .filter(m => m.date >= today)
        .slice(0, 7);
      if (meals.length === 0) return '';

      const rows = meals.map(m => {
        const d = new Date(m.date + 'T00:00:00');
        const label = `${DAY_NL[d.getDay()]} ${d.getDate()}`;
        const kcal = m.energy_kcal ? `${Math.round(m.energy_kcal)} kcal` : '';
        return `<div class="meal-row">
          <div class="meal-date">${label}</div>
          <div class="meal-name">${escapeHtml(m.meal_name)}</div>
          ${kcal ? `<div class="meal-kcal">${kcal}</div>` : ''}
        </div>`;
      }).join('');

      return `<div class="meals-block">
        <div class="meals-block-label">Maaltijden komende week</div>
        ${rows}
      </div>`;
    }

    // ── Barbell progressie (chart + table) ────────────────────────────────

    // Top lifts to show buttons for (most common CrossFit barbell movements)
    const TOP_LIFTS = [
      'Back Squat', 'Deadlift', 'Clean & Jerk', 'Snatch', 'Front Squat',
      'Bench Press', 'Shoulder Press', 'Clean', 'Push Jerk',
    ];

    function renderBarbellSection() {
      // Build buttons only for lifts we have history OR current data for
      const availableLifts = TOP_LIFTS.filter(l => barbellLifts[l] || barbellLiftsHistory.some(h => h.lifts && h.lifts[l]));
      if (availableLifts.length === 0) {
        // Fallback: just show table
        return `<div class="section-title">Kracht Maxima</div>` + renderBarbellTable();
      }

      activeChartLift = activeChartLift && availableLifts.includes(activeChartLift)
        ? activeChartLift
        : availableLifts[0];

      const buttons = availableLifts.map(l =>
        `<button class="chart-lift-btn${l === activeChartLift ? ' active' : ''}" onclick="selectLift('${escapeHtml(l)}')">${escapeHtml(l)}</button>`
      ).join('');

      const historyCount = barbellLiftsHistory.length;
      const historyNote = historyCount > 1
        ? `<span style="font-size:0.68rem;color:var(--muted);margin-left:auto">${historyCount} meetpunten</span>`
        : `<span style="font-size:0.68rem;color:var(--muted);margin-left:auto">Nog geen history — groeit elke dag</span>`;

      return `<div class="section-title">Kracht Progressie</div>
        <div class="chart-section">
          <div class="chart-controls">
            ${buttons}
            ${historyNote}
          </div>
          <div class="chart-container">
            <canvas id="liftChartCanvas"></canvas>
          </div>
        </div>
        <div class="section-title">Barbell Maxima</div>
        ${renderBarbellTable()}`;
    }

    function renderBarbellTable() {
      const lifts = Object.entries(barbellLifts).sort((a, b) => a[0].localeCompare(b[0], 'nl'));
      if (lifts.length === 0) return '<div class="empty" style="padding:1rem">Geen barbell data</div>';
      const rows = lifts.map(([name, rms]) => {
        const rmRows = Object.entries(rms).sort((a, b) => {
          const n = s => parseInt(s.replace('RM',''));
          return n(a[0]) - n(b[0]);
        }).map(([rm, val]) =>
          `<div class="barbell-rm-row">
            <span class="barbell-rm-label">${rm}</span>
            <span class="barbell-rm-val">${val} kg</span>
          </div>`
        ).join('');
        return `<div class="barbell-lift-item">
          <div class="barbell-lift-name">${escapeHtml(name)}</div>
          <div class="barbell-rm-list">${rmRows}</div>
        </div>`;
      }).join('');
      return `<div class="barbell-lift-list">${rows}</div>`;
    }

    function initBarbellChart() {
      if (typeof Chart === 'undefined') return;
      const canvas = document.getElementById('liftChartCanvas');
      if (!canvas) return;
      if (liftChart) { liftChart.destroy(); liftChart = null; }
      renderLiftChart(activeChartLift || TOP_LIFTS[0]);
    }

    function renderLiftChart(liftName) {
      const canvas = document.getElementById('liftChartCanvas');
      if (!canvas) return;
      if (liftChart) { liftChart.destroy(); liftChart = null; }

      // Build data points from history + current value
      const points = [];
      for (const snapshot of barbellLiftsHistory) {
        const liftData = snapshot.lifts && snapshot.lifts[liftName];
        if (!liftData) continue;
        const rm1 = liftData['1RM'];
        if (rm1 != null) points.push({ x: snapshot.date, y: rm1 });
      }
      // Add current value if not already in history for today
      const today = new Date().toISOString().slice(0, 10);
      const currentLift = barbellLifts[liftName];
      if (currentLift && currentLift['1RM'] != null && !points.find(p => p.x === today)) {
        points.push({ x: today, y: currentLift['1RM'] });
      }
      points.sort((a, b) => a.x.localeCompare(b.x));

      if (points.length === 0) {
        // No chart data — show current RM values as text
        canvas.style.display = 'none';
        const container = canvas.parentElement;
        const existing = container.querySelector('.chart-empty');
        if (!existing) {
          const div = document.createElement('div');
          div.className = 'chart-empty';
          const vals = currentLift ? Object.entries(currentLift).map(([k,v]) => `${k}: ${v}kg`).join(' · ') : 'Geen data';
          div.textContent = `${liftName}: ${vals}`;
          container.appendChild(div);
        }
        return;
      }
      canvas.style.display = '';
      const container = canvas.parentElement;
      const empty = container.querySelector('.chart-empty');
      if (empty) empty.remove();

      liftChart = new Chart(canvas, {
        type: 'line',
        data: {
          labels: points.map(p => {
            const d = new Date(p.x + 'T00:00:00');
            return `${d.getDate()} ${MONTH_NL[d.getMonth()]}`;
          }),
          datasets: [{
            label: `${liftName} 1RM (kg)`,
            data: points.map(p => p.y),
            borderColor: '#e8ff3c',
            backgroundColor: 'rgba(232,255,60,0.08)',
            pointBackgroundColor: '#e8ff3c',
            pointRadius: points.length < 10 ? 5 : 3,
            fill: true,
            tension: 0.3,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1e1e1e',
              titleColor: '#e8ff3c',
              bodyColor: '#f0f0f0',
              borderColor: '#2a2a2a',
              borderWidth: 1,
            },
          },
          scales: {
            x: {
              ticks: { color: '#666', font: { size: 10 } },
              grid: { color: '#1e1e1e' },
            },
            y: {
              ticks: { color: '#666', font: { size: 10 }, callback: v => `${v}kg` },
              grid: { color: '#1e1e1e' },
            },
          },
        },
      });
    }

    function selectLift(name) {
      activeChartLift = name;
      document.querySelectorAll('.chart-lift-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === name);
      });
      renderLiftChart(name);
    }

    // ── end barbell chart ─────────────────────────────────────────────────

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>

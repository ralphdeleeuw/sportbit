name: CrossFit Auto Sign-Up

on:
  schedule:
    - cron: "1 0 * * *"     # 01:01 CET (winter) / 02:01 CEST (zomer) — middernacht UTC
    - cron: "0 17 * * 0"    # 18:00 Amsterdam op zondag — weekoverzicht
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  actions: read

jobs:
  signup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auto sign-up with calendar sync
        if: github.event.schedule != '0 17 * * 0'
        env:
          SPORTBIT_USERNAME: ${{ secrets.SPORTBIT_USERNAME }}
          SPORTBIT_PASSWORD: ${{ secrets.SPORTBIT_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CLAIMS_EMAIL: ${{ secrets.VAPID_CLAIMS_EMAIL }}
        run: python3 autosignup.py --live --sync-calendar ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}

      - name: Stuur weekoverzicht
        if: github.event.schedule == '0 17 * * 0'
        env:
          SPORTBIT_USERNAME: ${{ secrets.SPORTBIT_USERNAME }}
          SPORTBIT_PASSWORD: ${{ secrets.SPORTBIT_PASSWORD }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CLAIMS_EMAIL: ${{ secrets.VAPID_CLAIMS_EMAIL }}
        run: python3 autosignup.py --weekly-summary
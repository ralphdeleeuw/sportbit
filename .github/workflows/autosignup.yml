name: CrossFit Auto Sign-Up

on:
  schedule:
    - cron: "30 22 * * *"   # 23:30 Amsterdam wintertijd (CET) — 30 min voor middernacht als buffer
    - cron: "30 21 * * *"   # 23:30 Amsterdam zomertijd (CEST) — 30 min voor middernacht als buffer
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  actions: read

jobs:
  signup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wacht op 00:01 Amsterdam tijd
        run: |
          python3 -c "
          import time
          from datetime import datetime
          from zoneinfo import ZoneInfo
          AMS = ZoneInfo('Europe/Amsterdam')
          while True:
              now = datetime.now(AMS)
              if now.hour == 0 and now.minute >= 1:
                  print(f'Start inschrijving om {now.strftime(\"%H:%M:%S\")} Amsterdam tijd')
                  break
              print(f'Wachten... huidige tijd: {now.strftime(\"%H:%M:%S\")} Amsterdam')
              time.sleep(10)
          "

      - name: Run auto sign-up with calendar sync
        env:
          SPORTBIT_USERNAME: ${{ secrets.SPORTBIT_USERNAME }}
          SPORTBIT_PASSWORD: ${{ secrets.SPORTBIT_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        run: python3 autosignup.py --live --sync-calendar --force
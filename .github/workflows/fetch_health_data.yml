name: Refresh Health Data

on:
  schedule:
    # Elke 4 uur (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      skip_strava:
        description: 'Strava data overslaan'
        required: false
        default: 'false'
        type: boolean
      skip_withings:
        description: 'Withings data overslaan'
        required: false
        default: 'false'
        type: boolean
      skip_intervals:
        description: 'Intervals.icu data overslaan'
        required: false
        default: 'false'
        type: boolean
      skip_myfitnesspal:
        description: 'MyFitnessPal data overslaan'
        required: false
        default: 'false'
        type: boolean

jobs:
  refresh-health:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic

      - name: Refresh Strava / Intervals.icu / Withings / Environmental data + AI coach
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          WITHINGS_REFRESH_TOKEN: ${{ secrets.WITHINGS_REFRESH_TOKEN }}
          WAQI_API_TOKEN: ${{ secrets.WAQI_API_TOKEN }}
          HEALTH_ONLY: 'true'
          MFP_USERNAME: ${{ secrets.MFP_USERNAME }}
          MFP_PASSWORD: ${{ secrets.MFP_PASSWORD }}
          SKIP_STRAVA: ${{ inputs.skip_strava || 'false' }}
          SKIP_WITHINGS: ${{ inputs.skip_withings || 'false' }}
          SKIP_INTERVALS: ${{ inputs.skip_intervals || 'false' }}
          SKIP_MYFITNESSPAL: ${{ inputs.skip_myfitnesspal || 'false' }}
        run: python3 fetch_sugarwod.py

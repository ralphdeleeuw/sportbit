name: Refresh Health Data

on:
  schedule:
    # Elke 4 uur (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      skip_strava:
        description: 'Strava data overslaan'
        required: false
        default: 'false'
        type: boolean
      skip_withings:
        description: 'Withings data overslaan'
        required: false
        default: 'false'
        type: boolean
      skip_intervals:
        description: 'Intervals.icu data overslaan'
        required: false
        default: 'false'
        type: boolean
      debug_intervals_keys:
        description: 'Intervals.icu ruwe API-keys loggen (discovery Fenix 8-velden)'
        required: false
        default: 'false'
        type: boolean
      debug_garmin_keys:
        description: 'Garmin slaaprespons-keys loggen (discovery huidtemperatuur)'
        required: false
        default: 'false'
        type: boolean

jobs:
  refresh-health:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml anthropic garth garminconnect

      - name: Refresh Strava / Intervals.icu / Withings / Environmental data + AI coach
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
          GARMIN_SESSION_ID: ${{ secrets.GARMIN_SESSION_ID }}
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          WITHINGS_REFRESH_TOKEN: ${{ secrets.WITHINGS_REFRESH_TOKEN }}
          WAQI_API_TOKEN: ${{ secrets.WAQI_API_TOKEN }}
          HEALTH_ONLY: 'true'
          SKIP_STRAVA: ${{ inputs.skip_strava || 'false' }}
          SKIP_WITHINGS: ${{ inputs.skip_withings || 'false' }}
          SKIP_INTERVALS: ${{ inputs.skip_intervals || 'false' }}
          INTERVALS_DEBUG_KEYS: ${{ inputs.debug_intervals_keys && '1' || '' }}
          GARMIN_DEBUG_KEYS: ${{ inputs.debug_garmin_keys && '1' || '' }}
        run: python3 fetch_sugarwod.py

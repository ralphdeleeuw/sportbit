name: Fetch SugarWOD

on:
  schedule:
    # Dagelijks om 06:00 UTC (08:00 Amsterdam zomertijd / 07:00 wintertijd)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-wod:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 playwright anthropic garth garminconnect

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fetch SugarWOD data and save to Gist
        env:
          SUGARWOD_EMAIL: ${{ secrets.SUGARWOD_EMAIL }}
          SUGARWOD_PASSWORD: ${{ secrets.SUGARWOD_PASSWORD }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_SESSION_ID: ${{ secrets.GARMIN_SESSION_ID }}
          GARMIN_SSO_SESSION: ${{ secrets.GARMIN_SSO_SESSION }}
        run: python3 fetch_sugarwod.py

name: Fetch SugarWOD

on:
  schedule:
    # Dagelijks om 07:00 Amsterdam tijd
    # 05:00 UTC zomertijd (CEST, UTC+2) — maart t/m oktober
    - cron: '0 5 * * *'
    # 06:00 UTC wintertijd (CET, UTC+1) — november t/m februari
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      skip_ai:
        description: 'AI coaching overslaan (sneller)'
        required: false
        default: 'false'
        type: boolean
      skip_myfitnesspal:
        description: 'MyFitnessPal data overslaan'
        required: false
        default: 'false'
        type: boolean

jobs:
  fetch-wod:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 playwright anthropic

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fetch SugarWOD data and save to Gist
        env:
          SUGARWOD_EMAIL: ${{ secrets.SUGARWOD_EMAIL }}
          SUGARWOD_PASSWORD: ${{ secrets.SUGARWOD_PASSWORD }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WAQI_API_TOKEN: ${{ secrets.WAQI_API_TOKEN }}
          MFP_USERNAME: ${{ secrets.MFP_USERNAME }}
          MFP_PASSWORD: ${{ secrets.MFP_PASSWORD }}
          SKIP_AI: ${{ inputs.skip_ai || 'false' }}
          SKIP_MYFITNESSPAL: ${{ inputs.skip_myfitnesspal || 'false' }}
          # HEALTH_ONLY is false (default): alleen SugarWOD ophalen, gecachte health data uit Gist gebruiken
        run: python3 fetch_sugarwod.py

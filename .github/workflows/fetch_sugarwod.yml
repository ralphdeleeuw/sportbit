name: Fetch SugarWOD

on:
  schedule:
    # Dagelijks om 06:00 UTC (08:00 Amsterdam zomertijd / 07:00 wintertijd)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      skip_strava:
        description: 'Strava data overslaan'
        required: false
        default: 'false'
        type: boolean
      skip_ai:
        description: 'AI coaching overslaan (sneller)'
        required: false
        default: 'false'
        type: boolean
      skip_withings:
        description: 'Withings data overslaan'
        required: false
        default: 'false'
        type: boolean

jobs:
  fetch-wod:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 playwright anthropic

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fetch SugarWOD data and save to Gist
        env:
          SUGARWOD_EMAIL: ${{ secrets.SUGARWOD_EMAIL }}
          SUGARWOD_PASSWORD: ${{ secrets.SUGARWOD_PASSWORD }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          WITHINGS_REFRESH_TOKEN: ${{ secrets.WITHINGS_REFRESH_TOKEN }}
          WAQI_API_TOKEN: ${{ secrets.WAQI_API_TOKEN }}
          SKIP_STRAVA: ${{ inputs.skip_strava || 'false' }}
          SKIP_AI: ${{ inputs.skip_ai || 'false' }}
          SKIP_WITHINGS: ${{ inputs.skip_withings || 'false' }}
        run: python3 fetch_sugarwod.py

name: Fetch Runna

on:
  schedule:
    # Dagelijks om 07:30 Amsterdam tijd (05:30 UTC zomertijd)
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  fetch-runna:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fetch Runna data and save to Gist
        env:
          RUNNA_EMAIL: ${{ secrets.RUNNA_EMAIL }}
          RUNNA_PASSWORD: ${{ secrets.RUNNA_PASSWORD }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python3 fetch_runna.py

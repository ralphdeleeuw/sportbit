name: Huppa API Discovery

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe Huppa API endpoints
        env:
          HUPPA_EMAIL: ${{ secrets.HUPPA_EMAIL }}
          HUPPA_PASSWORD: ${{ secrets.HUPPA_PASSWORD }}
          HUPPA_SUBDOMAIN: ${{ secrets.HUPPA_SUBDOMAIN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python3 huppa_discover.py

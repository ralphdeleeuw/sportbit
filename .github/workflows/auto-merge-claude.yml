name: Auto-merge Claude branches

on:
  push:
    branches:
      - "claude/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"

          # Controleer of er commits zijn die nog niet in main zitten
          AHEAD=$(git rev-list --count origin/main..HEAD)
          if [ "$AHEAD" -eq 0 ]; then
            echo "Geen nieuwe commits t.o.v. main — niets te mergen."
            exit 0
          fi

          # Maak PR aan als die nog niet bestaat
          PR_URL=$(gh pr list --head "$BRANCH" --json url -q '.[0].url')

          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --title "Auto: $BRANCH" \
              --body "Automatisch aangemaakt door Claude." \
              --base main \
              --head "$BRANCH")
            echo "PR aangemaakt: $PR_URL"
          else
            echo "Bestaande PR gevonden: $PR_URL"
            # Los eventuele merge-conflicten op door main te mergen in de branch
            git config user.email "claude@anthropic.com"
            git config user.name "Claude"
            git fetch origin main
            git merge origin/main --no-edit || {
              echo "Merge conflict kon niet automatisch worden opgelost."
              exit 1
            }
            git push origin "$BRANCH"
            sleep 3
          fi

          # Wacht even en merge
          sleep 3
          gh pr merge "$PR_URL" --merge --delete-branch
